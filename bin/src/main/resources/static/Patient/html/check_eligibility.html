<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>การตรวจสอบสิทธิการรักษา</title>
    <link rel="stylesheet" href="../css/check_eligibility.css">
    <script src="../js/Payment.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <div class="main-container">
        <header class="header">
            <div class="header-content">
                <button class="back-btn" onclick="history.back()">
                    <i class="fas fa-arrow-left"></i>
                  </button>
                <h1>ตรวจสอบสิทธิ</h1>
            </div>
        </header>

        <main class="content-area">
        
        <div class="search-section">
            <label class="input-label">หมายเลขบัตรประชาชน</label>
            <input 
                type="text" 
                id="citizenId" 
                placeholder="กรอกเลขบัตรประชาชน 13 หลัก" 
                maxlength="13"
                inputmode="numeric"
            >
            
            <button class="btn-search" onclick="handleSearch()">ค้นหา</button>
        </div>

        <hr class="divider">

        <div id="resultArea" style="display: none;">
            <div class="result-card">
                <span class="badge-title">สิทธิการรักษา</span>
                
                <div class="result-row">
                    <span class="label">ประเภทสิทธิ</span>
                    <span class="value" id="resType">-</span>
                </div>
                <div class="result-row">
                    <span class="label">หน่วยบริการ</span>
                    <span class="value" id="resHospital">-</span>
                </div>
                <div class="result-row">
                    <span class="label">สถานะ</span>
                    <span class="value status-ok" id="resStatus">-</span>
                </div>
            </div>
        </div>

    </main>
    
    <script src="../../Patient/JS/check_eligibility.js"></script>

    </div>
</body>
