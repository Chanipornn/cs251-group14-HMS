<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ชำระเงินเต็มจอ</title>
    <link rel="stylesheet" href="../css/PaymentDetail.css">
    <script src="../js/PaymentDetail.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <div class="full-page-container">
        <div class="payment-card-wide">
            <div class="card-header">
                <div class="header-top">
                    <button class="back-btn"><i class="fas fa-arrow-left"></i></button>
                    <h1>รายละเอียดการชำระเงิน</h1>
                </div>
            </div>

            <div class="card-content">
                <div class="content-flex">

                    <div class="details-side">
                        <div class="visit-info">
                            <p class="timestamp">11/04/2026 09:46:15</p>
                            <h3>แผนก หู คอ จมูก</h3>
                            <p>แพทย์ นพ.สมชาย ศรีสุข</p>
                            <p>ตรวจทั่วไป</p>
                        </div>

                        <div class="bill-list">
                            <div class="item"><span>ค่าตรวจแพทย์</span><span>300 บาท</span></div>
                            <div class="item"><span>ค่ายา</span><span>150 บาท</span></div>
                            <div class="item"><span>ค่าบริการโรงพยาบาล</span><span>50 บาท</span></div>
                            <div class="divider-dashed"></div>
                            <div class="item total"><span>รวมทั้งสิ้น</span><span>500 บาท</span></div>
                            <div class="item promo">
                                <span class="badge">สิทธิบัตรทอง</span>
                                <span class="discount">-300 บาท</span>
                            </div>
                        </div>
                    </div>

                    <div class="payment-side">
                        <h3>เลือกวิธีชำระเงิน</h3>
                        <div class="methods">
                            <label class="method-row">
                                <input type="radio" name="pay" checked>
                                <span class="custom-radio"></span>
                                <i class="fas fa-mobile-alt"></i> PromptPay
                            </label>
                            <label class="method-row">
                                <input type="radio" name="pay">
                                <span class="custom-radio"></span>
                                <i class="fas fa-credit-card"></i> บัตรเครดิต/เดบิต
                            </label>
                            <label class="method-row">
                                <input type="radio" name="pay">
                                <span class="custom-radio"></span>
                                <i class="fas fa-wallet"></i> e-Wallet
                            </label>
                        </div>
                    </div>

                </div>

                <div class="card-footer">
                    <div class="summary-box">
                        <div class="payable-text">ยอดที่ต้องชำระ</div>
                        <div class="payable-amount">200 บาท</div>
                    </div>
                    <div class="btn-group">
                        <button class="btn-cancel">ยกเลิก</button>
                        <button class="btn-confirm">ยืนยันการชำระ</button>
                    </div>


                    <div id="successModal"
                        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); align-items:center; justify-content:center; z-index:9999; backdrop-filter: blur(5px);">
                        <div
                            style="background:white; padding:40px; border-radius:25px; text-align:center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 90%; max-width: 400px;">
                            <i class="fas fa-check-circle"
                                style="font-size:70px; color:#4CAF50; margin-bottom:20px;"></i>
                            <h2 style="font-family: 'Sarabun';">ชำระเงินสำเร็จ</h2>
                            <p style="margin-top:10px; color: #666;">ระบบได้รับการชำระเงินเรียบร้อยแล้ว</p>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

</body>

</html>
