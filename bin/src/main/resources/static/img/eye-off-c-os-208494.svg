      <cc:Work rdf:about="">
        <dc:title>No Eye Symbol</dc:title>
        <dc:description>A simple icon representing the concept of &quot;no eye&quot; or &quot;do not look,&quot; often used to convey privacy or secrecy. This symbol can be applied in various contexts where visual discretion is required.</dc:description>
