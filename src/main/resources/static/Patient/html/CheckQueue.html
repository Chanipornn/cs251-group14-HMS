<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตรวจสอบคิว</title>

    <link rel="stylesheet" href="../css/CheckQueue.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

<div class="mobile-container">

    <!-- HEADER -->
    <header class="app-header">
            <a href="#" class="back-btn" onclick="window.location.href='home.html'">
                    <i class="fas fa-arrow-left"></i>
                </a>
        <h1>ตรวจสอบคิว</h1>
    </header>

    <!-- CONTENT -->
    <div class="queue-content"></div>

    <!-- ================= CANCEL MODAL ================= -->
    <div id="cancelModal" class="modal-overlay">
        <div class="modal-content">

            <div class="modal-icon-red">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>

            <h2>ยืนยันการยกเลิกคิว</h2>
            <p>คุณแน่ใจหรือไม่ว่าต้องการยกเลิกคิวนี้?</p>

            <div class="modal-buttons">
                <button class="btn-keep" onclick="closeCancelModal()">เก็บคิวไว้</button>
                <button class="btn-confirm-cancel" id="confirmCancelBtn">ยืนยันยกเลิก</button>
            </div>

        </div>
    </div>

    <!-- ================= EDIT MODAL ================= -->
    <div id="editModal" class="modal-overlay">
        <div class="modal-content reschedule-box">

            <h2 class="modal-title">เลื่อนนัด</h2>

            <div class="form-group">
                <label>🏥 แผนก</label>
                <input type="text" id="editDept">
            </div>

            <div class="form-group">
                <label>👨‍⚕️ แพทย์</label>
                <input type="text" id="editDoctor">
            </div>

            <div class="form-group">
                <label>📝 เหตุผล</label>
                <input type="text" id="editReason">
            </div>

            <div class="form-group">
                <label>📅 วันเวลา</label>
                <input type="text" id="editDate">
            </div>

            <div class="modal-buttons">
                <button class="btn-no" onclick="closeEditModal()">ยกเลิก</button>
                <button class="btn-yes" onclick="saveEdit()">บันทึก</button>
            </div>

        </div>
    </div>

    <!-- ================= SUCCESS MODAL ================= -->
    <div id="successEditModal" class="modal-overlay">
        <div class="modal-content">

            <div class="modal-icon-green">
                <i class="fa-solid fa-circle-check"></i>
            </div>

            <h2>เลื่อนนัดสำเร็จ</h2>
            <p>ระบบได้อัปเดตข้อมูลของคุณเรียบร้อยแล้ว</p>

            <div class="modal-buttons">
                <button class="btn-yes" onclick="goToQueue()">ตกลง</button>
            </div>

        </div>
    </div>

</div>

<script src="../js/CheckQueue.js"></script>

</body>
</html>
