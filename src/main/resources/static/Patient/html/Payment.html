<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบชำระเงิน - Full Responsive</title>

    <link rel="stylesheet" href="../css/Payment.css">
    <script src="../js/Payment.js" defer></script>

    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

<div class="main-container">
    <header class="header">
        <div class="header-content">

            <!-- ✅ ปุ่ม Back แบบกันพลาด -->
            <a href="#" class="back-btn" onclick="handleBack(event)">
                <i class="fas fa-arrow-left"></i>
            </a>

            <h1>ชำระเงิน</h1>
        </div>
    </header>

	<main class="content-wrapper">
	        <!-- 🌟 เพิ่ม id="paymentGrid" และเอาการ์ดเดิมออก เพื่อรอรับข้อมูลจาก JS -->
	        <div class="payment-grid" id="paymentGrid">
	            <p style="text-align: center; margin-top: 50px; color: #999;">กำลังโหลดใบแจ้งหนี้...</p>
	        </div>
	    </main>
</div>

<!-- ================= PAYMENT SUCCESS MODAL ================= -->
<div id="paymentModal" class="modal-overlay">
    <div class="modal-content">

        <div class="modal-icon-green">
            <i class="fa-solid fa-circle-check"></i>
        </div>

        <h2>สำเร็จ</h2>
        <p>ดำเนินการชำระเงินสำเร็จเรียบร้อยแล้ว</p>

        <div class="modal-buttons">
            <button class="btn-yes" onclick="closePaymentModal()">ตกลง</button>
        </div>

    </div>
</div>
</body>
</html>
