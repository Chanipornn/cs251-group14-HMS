<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ยกเลิกการนัดหมาย</title>
  <link rel="stylesheet" href="../css/appointment-styles.css">
</head>
<body>
<div class="page-wrap page-blur">

<header class="header">
  <div class="left-section">
    <div class="menu-icon" onclick="toggleSidebar()">☰</div>
    <img src="../../img/hospital.png" class="circle-img" onerror="this.style.display='none'">
  </div>

  <div class="profile">
    <span>นพ.วิรุต</span>
    <div class="avatar" style="background-image: url('../../img/profile.png');"></div>
  </div>
</header>

<div class="container">

<aside class="sidebar" id="sidebar">
  <h3>เมนู</h3>

  <a href="medical_history.html" class="menu">ประวัติการรักษา</a>
  <a href="history.html" class="menu">การจ่ายยา</a>
  <a href="appointment.html" class="menu active">การนัดหมาย</a>
  <a href="medical_certificate_history.html" class="menu">การออกใบรับรองแพทย์</a>
  <a href="invoice_history.html" class="menu">ใบแจ้งหนี้</a>

  <div class="logout" onclick="logout()">
    <img src="../../img/log out.png" class="logoutlogo" onerror="this.style.display='none'">ออกจากระบบ
  </div>
</aside>

  <main class="main">
    <div class="form-title">
      <button class="back-link" type="button" onclick="goBackToEdit()">‹</button>
      <h1>แก้ไขการนัดหมาย</h1>
    </div>

    <form class="appointment-form">
      <div class="row">
        <label>รหัสประจำตัวผู้ป่วย :</label>
        <input type="text" id="patientId" readonly>
        <label>รหัสประจำตัว แพทย์/เจ้าหน้าที่ :</label>
        <input type="text" id="doctorId" readonly>
      </div>

      <div class="row single">
        <label>วันที่นัดหมาย :</label>
        <input type="date" id="appointmentDate" readonly>
      </div>

      <div class="row single">
        <label>เวลาที่นัดหมาย :</label>
        <input type="time" id="appointmentTime" readonly>
      </div>

      <div class="row single">
        <label>รหัสประจำตัวแพทย์เจ้าของเคส :</label>
        <input type="text" id="caseDoctorId" readonly>
      </div>
    </form>

    <div class="notice">
      <span>⊠</span>
      <span>ยกเลิกการนัดหมาย : การนัดหมายนี้จะถูกลบทันที</span>
    </div>

    <div class="form-actions">
      <button class="btn btn-secondary" type="button" onclick="goBackToEdit()">ยกเลิกการแก้ไข</button>
      <button class="btn btn-primary" type="button" onclick="deleteAppointment()">ยืนยันแก้ไข</button>
    </div>

  </main>
</div>
</div>

<div class="modal-overlay">
  <div class="modal">
    <button class="modal-close" type="button" onclick="goBackToEdit()">×</button>
    <div class="modal-icon">×</div>
    <h2>คุณยืนยันที่จะยกเลิกการนัดหมายนี้มั้ย ?</h2>
    <input class="modal-input" type="text" id="staffCode" placeholder="กรุณากรอกรหัสประจำตัว แพทย์ / เจ้าหน้าที่ เช่น 1112222333">
    <div class="modal-actions">
      <button class="btn btn-secondary" type="button" onclick="goBackToEdit()">ยกเลิกการแก้ไข</button>
      <button class="btn btn-danger" type="button" onclick="deleteAppointment()">ยืนยันแก้ไข</button>
    </div>
  </div>
</div>

<script src="../JS/appointment.js"></script>
</body>
</html>
