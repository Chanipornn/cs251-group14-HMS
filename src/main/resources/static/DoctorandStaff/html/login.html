<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link rel="stylesheet" href="../css/login.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

</head>

<body>

<div class="container">

    <div class="logo">
        <div class="plus"></div>
    </div>

    <div class="login-box">

        <h2>เข้าสู่ระบบ</h2>
        <p class="sub">ระบบแพทย์</p>

        <label>อีเมล :</label>
        <input type="text">

        <label>รหัสผ่าน :</label>
        <div class="password">
            <input type="password">
            <i class="fa fa-eye-slash"></i>
        </div>

        <button>เข้าสู่ระบบ</button>

    </div>

</div>

</body>
</html>
