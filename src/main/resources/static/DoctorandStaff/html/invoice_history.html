<!DOCTYPE html>
<html lang="th">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>ประวัติใบแจ้งหนี้</title>
	<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
	<link rel="stylesheet" href="/DoctorandStaff/css/styles.css">
</head>

<body data-page="invoice-history">
	<div class="app-shell">
		<!-- HEADER -->
		<header class="header">
			<div class="left-section">
				<div class="menu-icon" onclick="toggleSidebar()">☰</div>
				<img src="../../img/hospital.png" class="circle-img">
			</div>

			<div class="profile">
				<span id = "displayName"></span>
				<div class="avatar" style="background-image: url('../../img/profile.png');"></div>
			</div>
		</header>

		<div class="container">

			<!-- SIDEBAR -->
			<aside class="sidebar">
				<h3>เมนู</h3><br>

				<a href="/doctorandstaff/medical_history" class="menu">ประวัติการรักษา</a>
				<a href="/doctorandstaff/history" class="menu">การจ่ายยา</a>
				<a href="/doctorandstaff/appointment" class="menu">การนัดหมาย</a>
				<a href="/doctorandstaff/medical_certificate" class="menu">การออกใบรับรองแพทย์</a>
				<a href="/doctorandstaff/invoice" class="menu active">ใบแจ้งหนี้</a>

				<div class="logout" onclick="logout()">
					<img src="../../img/log out.png" class="logoutlogo">ออกจากระบบ
				</div>
			</aside>
			<main class="main">
				<div class="search-row">
					<div class="search-box">
						<input type="text" placeholder="รหัสผู้ป่วย">
						<i class="fa-solid fa-magnifying-glass"></i>
					</div>
				</div>
				<div class="page-title">
					<h1>ประวัติใบแจ้งหนี้</h1>
				</div>
				<div class="two-col">
					<section>
						<div id="recordList" class="card-list"></div>
						<button class="add-link" data-nav="create_invoice.html">+ สร้างใบแจ้งหนี้</button>
					</section>
					<section id="previewPanel" class="preview-panel"></section>
				</div>
			</main>
		</div>
	</div>
	<script src="../js/app.js"></script>
</body>

<script>
	window.onload = async function () {
		try {
			const response = await fetch('/api/doctorandstaff/me');
			console.log(response);
			if (response.status === 401) {
				alert("กรุณาล็อคอินก่อนเข้าใช้งาน");
				window.location.href = "/doctorandstaff";
				return;
			}

			const data = await response.json();
			document.getElementById('displayName').textContent = data.name;

		} catch (error) {
			console.error("เกิดข้อผิดพลาด:", error);
		}
	};


	async function logout() {
		await fetch('/api/logout', {method: 'POST'});
		window.location.href = "/";
	}
</script>

</html>
