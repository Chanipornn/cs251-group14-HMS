<!DOCTYPE html>
<html lang="th">

<head>
	<meta charset="UTF-8">
	<title>รายการใบแจ้งหนี้ และ การจ่ายยา</title>

	<link rel="stylesheet" href="/DoctorandStaff/css/history.css">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
	<style>
		/* สไตล์เพิ่มเติมสำหรับตาราง Invoice Items ให้ดูสวยงาม */
		.invoice-items-table {
			width: 100%;
			border-collapse: collapse;
			margin-top: 15px;
		}

		.invoice-items-table th,
		.invoice-items-table td {
			border: 1px solid #ddd;
			padding: 8px;
			text-align: left;
		}

		.invoice-items-table th {
			background-color: #f2f2f2;
		}
	</style>
</head>

<body>

	<header class="header">
		<div class="left-section">
			<div class="menu-icon" onclick="toggleSidebar()">☰</div>
			<img src="../../img/hospital.png" class="circle-img">
		</div>

		<div class="profile">
			<span id="displayName">กำลังโหลด...</span>
			<div class="avatar" style="background-image: url('../../img/profile.png');"></div>
		</div>
	</header>

	<div class="container">

		<aside class="sidebar">
			<h3>เมนู</h3><br>

			<a href="/doctorandstaff/medical_history" class="menu">ประวัติการรักษา</a>
			<a href="/doctorandstaff/history" class="menu active">การจ่ายยา/ใบแจ้งหนี้</a>
			<a href="/doctorandstaff/appointment" class="menu">การนัดหมาย</a>
			<a href="/doctorandstaff/medical_certificate" class="menu">การออกใบรับรองแพทย์</a>
			<a href="/doctorandstaff/invoice" class="menu">ใบแจ้งหนี้</a>

			<div class="logout" onclick="logout()">
				<img src="../../img/log out.png" class="logoutlogo">ออกจากระบบ
			</div>
		</aside>

		<div class="main">

			<div class="search">
				<input type="text" id="searchInput" placeholder="ค้นหารหัสใบแจ้งหนี้ หรือ รหัสผู้ป่วย...">
				<i class="fa fa-search"></i>
			</div>

			<h2>ประวัติใบแจ้งหนี้และการจ่ายยา</h2>

			<div class="content">

				<div class="list" id="invoiceList">
					<p style="text-align:center; margin-top:20px;">กำลังโหลดข้อมูล...</p>
				</div>

				<div class="detail" id="prescriptionDetail">
					<h3 style="color:#999; text-align:center; margin-top:50px;">กรุณาเลือกใบแจ้งหนี้เพื่อดูรายละเอียด
					</h3>
				</div>

			</div>

		</div>

	</div>
</body>

<script>
	let allHistoryRecords = []; // เปลี่ยนชื่อตัวแปรให้ตรงกับความหมายมากขึ้น
	let DoctorID;

	window.onload = async function () {
		try {
			const response = await fetch('/api/doctorandstaff/me');
			if (response.status === 401) {
				alert("กรุณาล็อคอินก่อนเข้าใช้งาน");
				window.location.href = "/doctorandstaff";
				return;
			}
			const data = await response.json();
			document.getElementById('displayName').textContent = data.name;

			// รองรับทั้ง camelCase และ PascalCase
			DoctorID = data.doctorId || data.DoctorID;

			if (!DoctorID) {
				console.error("ไม่พบรหัสแพทย์ใน Session");
				return;
			}

			// ดึงข้อมูล Prescription + Invoice History ของหมอคนนี้
			await fetchHistoryRecords();
			setupSearch();

		} catch (error) {
			console.error("เกิดข้อผิดพลาด:", error);
		}
	};

	// 📌 ดึงข้อมูลจาก API ตัวใหม่ที่คืนค่า Projection
	async function fetchHistoryRecords() {
		try {
			const res = await fetch('/api/prescriptions/doctor/' + DoctorID);
			if (!res.ok) throw new Error('Failed to fetch history records');

			allHistoryRecords = await res.json();
			renderCards(allHistoryRecords);
			console.log(allHistoryRecords)
			// ถ้ามีข้อมูล ให้โชว์รายละเอียดของใบแรกสุด (ฝั่งขวา)
			if (allHistoryRecords.length > 0) {
				fetchAndShowDetails(allHistoryRecords[0]);
			}
		} catch (error) {
			console.error(error);
			document.getElementById('invoiceList').innerHTML = '<p style="color:red; text-align:center;">ไม่สามารถดึงข้อมูลประวัติได้</p>';
		}
	}

	// 📌 วาดการ์ดประวัติ (ฝั่งซ้าย)
	function renderCards(records) {
		const listContainer = document.getElementById('invoiceList');
		listContainer.innerHTML = '';

		if (records.length === 0) {
			listContainer.innerHTML = '<p style="text-align:center; color:#999;">ไม่พบข้อมูล</p>';
			return;
		}

		records.forEach((record, index) => {
			const card = document.createElement('div');
			card.className = `card ${index === 0 ? 'active' : ''}`;

			// เมื่อคลิกการ์ด ให้ดึงรายละเอียดมาแสดงฝั่งขวา
			card.onclick = () => {
				document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
				card.classList.add('active');
				fetchAndShowDetails(record);
			};

			const statusColor = record.invoiceStatus === 'Paid' ? 'green' : (record.invoiceStatus === 'Unpaid' ? 'red' : 'orange');
			const fullName = `${record.patientName || ''} ${record.patientSurname || ''}`.trim();

			card.innerHTML = `
				<p>วันที่ : <b>${record.visitDate || '-'}</b></p>
				<p>ชื่อคนไข้ : ${fullName || 'ไม่ระบุ'}</p>
				<p>ใบสั่งยา : ${record.prescriptionId || '-'} | บิล : ${record.invoiceId || '-'}</p>
				<p>ชื่อยา : ${record.medicineName || '-'}</p>
				<p>ยอดรวม : ${record.totalAmount != null ? record.totalAmount : '-'} บาท</p>
				<p style="color:${statusColor}; font-weight:bold;">สถานะบิล : ${record.invoiceStatus || 'ไม่มีบิล'}</p>
			`;
			listContainer.appendChild(card);
		});
	}

	// 📌 แสดงรายละเอียดฝั่งขวา (ยา + Invoice Items)
	async function fetchAndShowDetails(record) {
		const detailContainer = document.getElementById('prescriptionDetail');
		const fullName = `${record.patientName || ''} ${record.patientSurname || ''}`.trim();

		// ส่วนที่ 1: เตรียม HTML สำหรับข้อมูลคนไข้และยา
		let htmlContent = `
			<h3>รายละเอียดการจ่ายยาและใบแจ้งหนี้</h3>
			<p>อ้างอิงใบแจ้งหนี้ : <b>${record.invoiceId || '-'}</b></p>
			<p>รหัสใบสั่งยา : ${record.prescriptionId || '-'}</p>
			<hr>
			<p>รหัสผู้ป่วย : ${record.patientId || '-'}</p>
			<p>ชื่อ-นามสกุล : ${fullName || 'ไม่ระบุ'}</p>
			<br>
			
			<div style="background:#f4f6f9; padding:15px; border-radius:8px;">
				<h4 style="margin-top:0;">ข้อมูลการจ่ายยา</h4>
				<p><b>ชื่อยา :</b> ${record.medicineName || '-'}</p>
				<p><b>ปริมาณการใช้ยา :</b> ${record.dosage || '-'}</p>
				<p><b>ระยะเวลาใช้ยา :</b> ${record.duration || '-'}</p>
				<p><b>คำแนะนำ :</b> ${record.instruction || '-'}</p>
			</div>
			
			<br>
			<h4>รายการค่าใช้จ่าย (Invoice Items)</h4>
			<div id="invoiceItemsSection">กำลังโหลดรายการค่าใช้จ่าย...</div>

			<div class="edit" onclick="window.location.href='#'" style="margin-top:20px;">
				แก้ไข <i class="fa fa-pen"></i>
			</div>
		`;

		detailContainer.innerHTML = htmlContent;

		// ส่วนที่ 2: ไปดึงข้อมูล InvoiceItems ย่อยมาแสดง
		const itemsSection = document.getElementById('invoiceItemsSection');

		if (!record.invoiceId) {
			itemsSection.innerHTML = '<p style="color:#999; font-style:italic;">ยังไม่มีการออกใบแจ้งหนี้ (Invoice) สำหรับการรักษานี้</p>';
			return;
		}

		try {
			// ยิง API ดึงรายการย่อยของบิลใบนี้
			const res = await fetch(`/api/invoices/${record.invoiceId}/items`);
			if (!res.ok) throw new Error('Failed to fetch invoice items');

			const items = await res.json();

			if (items.length === 0) {
				itemsSection.innerHTML = '<p style="color:#999;">ไม่มีรายการค่าใช้จ่ายย่อย</p>';
				return;
			}

			// วาดตารางแสดงรายการค่าใช้จ่าย
			let itemsTable = `
				<table class="invoice-items-table">
					<thead>
						<tr>
							<th>ลำดับ</th>
							<th>รายละเอียด (Description)</th>
							<th>จำนวนเงิน (บาท)</th>
						</tr>
					</thead>
					<tbody>
			`;

			items.forEach((item, idx) => {
				itemsTable += `
					<tr>
						<td>${idx + 1}</td>
						<td>${item.description || '-'}</td>
						<td>${item.amount != null ? item.amount.toLocaleString() : '0'}</td>
					</tr>
				`;
			});

			itemsTable += `
					</tbody>
				</table>
				<h4 style="text-align:right; margin-top:15px;">ยอดรวมทั้งหมด: ${record.totalAmount != null ? record.totalAmount.toLocaleString() : '0'} บาท</h4>
			`;

			itemsSection.innerHTML = itemsTable;

		} catch (error) {
			console.error(error);
			itemsSection.innerHTML = '<p style="color:red;">ไม่สามารถโหลดรายการค่าใช้จ่ายได้</p>';
		}
	}

	// 📌 ระบบค้นหา
	function setupSearch() {
		const searchInput = document.getElementById('searchInput');
		searchInput.addEventListener('input', function (e) {
			const keyword = e.target.value.toLowerCase();

			// ค้นหาได้จากรหัสบิล, รหัสคนไข้, ชื่อคนไข้
			const filteredRecords = allHistoryRecords.filter(record => {
				const invId = String(record.invoiceId || '').toLowerCase();
				const pId = String(record.patientId || '').toLowerCase();
				const pName = String(record.patientName || '').toLowerCase();
				return invId.includes(keyword) || pId.includes(keyword) || pName.includes(keyword);
			});

			renderCards(filteredRecords);

			if (filteredRecords.length > 0) {
				fetchAndShowDetails(filteredRecords[0]);
			} else {
				document.getElementById('prescriptionDetail').innerHTML = '<h3 style="color:#999; text-align:center; margin-top:50px;">ไม่พบข้อมูล</h3>';
			}
		});
	}

	async function logout() {
		await fetch('/api/logout', {method: 'POST'});
		window.location.href = "/";
	}
</script>

</html>
