<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Admin Profile</title>

<link rel="stylesheet" href="../css/profile.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

</head>

<body>

<!-- 🔥 HEADER เต็มจอ -->
<div class="header">
    <div class="left">
        <i class="fa fa-bars"></i>

        <div class="logo">
            <i class="fa fa-plus"></i>
        </div>
    </div>

    <div class="right">
        <span>Admin 1</span>
        <i class="fa-regular fa-user"></i>
    </div>
</div>

<!-- 🔥 content ด้านล่าง -->
<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="menu">
            <p>จัดการผู้ใช้</p>
            <p>จัดการข้อมูลบุคลากร</p>
        </div>

        <div class="logout">
            <i class="fa fa-sign-out-alt"></i> ออกจากระบบ
        </div>
    </div>

    <!-- Main -->
    <div class="main">
        <div class="profile">

            <div class="avatar">
                <i class="fa-regular fa-user"></i>
            </div>

            <h3>Username</h3>
            <p class="email">Username@gmail.com</p>

            <hr>

            <div class="info">
                <div class="row">
                    <span class="label">ชื่อ-นามสกุล</span>
                    <span class="value">พิมพ์พรณ สุขสวัสดิ์</span>
                    <i class="fa fa-pen"></i>
                </div>

                <div class="row">
                    <span class="label">หมายเลขโทรศัพท์</span>
                    <span class="value">0922334434</span>
                    <i class="fa fa-pen"></i>
                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
