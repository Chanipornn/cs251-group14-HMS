<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Create Account</title>

  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="../css/Edit_Information.css">
  <link rel="stylesheet" href="../css/create_account.css">

  <script src="../js/create_account.js" defer></script>
</head>

<body>

<header class="header">
  <div class="left-section">
    <div class="menu-icon" onclick="toggleSidebar()">☰</div>
    <img src="../../img/hospital.png" class="circle-img">
  </div>

  <div class="profile">
    <span>Admin 1</span>
    <div class="avatar" style="background-image: url('../../img/profile.png');"></div>
  </div>
</header>

<div class="container">

  <aside class="sidebar">
    <h3>เมนู</h3><br>
    <a href="User_Dashboard.html" class="menu">จัดการผู้ใช้</a>
    <a href="dashboard.html" class="menu">จัดการบุคลากร</a>

    <div class="logout" onclick="logout()">
      <img src="../../img/log out.png" class="logoutlogo">ออกจากระบบ
    </div>
  </aside>

  <main class="main">

    <div class="form-container">

      <!-- HEADER -->
      <div class="form-header">
        <img src="../../img/profile.jpg" class="profile-img">
        <div class="user-info">
          <h3>Create Account</h3>
          <p>สำหรับ Admin / Doctor / Staff</p>
        </div>
      </div>

      <div class="form-body">

        <form id="createForm">
      
          <div class="form-grid">
      
            <!-- LEFT -->
            <div class="left-column">
      
              <div class="form-group">
                <label>ชื่อผู้ใช้ *</label>
                <input type="text" id="name">
              </div>
      
              <div class="form-group">
                <label>อีเมล *</label>
                <input type="email" id="email">
              </div>
      
              <div class="form-group">
                <label>รหัสผ่าน *</label>
                <input type="password" id="password">
              </div>
      
              <div class="form-group">
                <label>ยืนยันรหัสผ่าน *</label>
                <input type="password" id="confirmPassword">
              </div>
      
              <div class="form-group">
                <label>ชื่อ-นามสกุล *</label>
                <div class="inline-group">
                  <input type="text" id="firstName" placeholder="ชื่อ">
                  <input type="text" id="surname" placeholder="นามสกุล">
                </div>
              </div>
      
              <div class="form-group">
                <label>หมายเลขโทรศัพท์ *</label>
                <input type="text" id="telephone">
              </div>
      
            </div>
      
            <!-- RIGHT -->
            <div class="right-column">
      
              <div class="form-group">
                <label>Role *</label>
      
                <div class="role-selector">
                  <button type="button" class="role-btn" data-role="Patient">Patient</button>
                  <button type="button" class="role-btn active" data-role="Doctor">Doctor</button>
                  <button type="button" class="role-btn" data-role="Staff">Staff</button>
                  <button type="button" class="role-btn" data-role="Admin">Admin</button>
                </div>
      
                <input type="hidden" id="role" value="Doctor">
              </div>
      
            </div>
      
          </div>
      
          <!-- BUTTON -->
          <div class="btn-group">
            <button type="button" class="cancel-btn" onclick="goBack()">ยกเลิก</button>
            <button type="submit" class="save-btn">สร้างผู้ใช้</button>
          </div>
      
        </form>
      
      </div>

      

    </div>

  </main>

</div>

<div id="successModal" class="modal-overlay">
  <div class="modal-content">
    <h2>สร้างสำเร็จ!</h2>
    <p>ระบบได้บันทึกข้อมูลเรียบร้อยแล้ว</p>
    <button class="btn-confirm" onclick="closeModal()">ตกลง</button>
  </div>
</div>

</body>
</html>
