<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>Edit Doctor - Admin Dashboard</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/Doctor_Edit_Add.css">
    <script src="../js/dashboard.js" defer></script>
    <script src="../js/Doctor_Edit_Add.js" defer></script>
</head>

<body>

<header class="header">
    <div class="left-section">
        <div class="menu-icon" onclick="toggleSidebar()">☰</div>
        <img src="../../img/hospital.png" class="circle-img">
    </div>
    <div class="profile" onclick="goProfile()">
        <span>Admin 1</span>
        <div class="avatar" style="background-image: url('../../img/profile.png');"></div>
    </div>
</header>

<div class="container">
    <aside class="sidebar">
        <h3>เมนู</h3>
        <br>
        <a href="User_Dashboard.html" class="menu">จัดการผู้ใช้</a>
        <a href="dashboard.html" class="menu">จัดการบุคลากร</a>
        <div class="logout" onclick="logout()">
            <img src="../../img/log out.png" class="logoutlogo">ออกจากระบบ
        </div>
    </aside>

    <main class="main">

        <div class="edit-card">
            <div class="edit-card-header">
                <h3>แก้ไขข้อมูล</h3>
            </div>

            <div class="edit-card-body">
                <div class="profile-layout">

                    <div class="profile-image-container">
                        <img src="../../img/doctor_img1.png" class="profile-main-img">
                    </div>

                    <div class="profile-details-form">

                        <div class="user-id-row">
                            <div class="user-meta">
                                <span class="label">Username</span>
                                <span class="value"></span>
                            </div>
                            <span class="role-badge doctor"></span>
                        </div>

                        <hr class="divider">

                        <h2 class="display-name"></h2>

                        <div class="contact-info">
                            <span class="label">หมายเลขโทรศัพท์</span>
                            <span class="value"></span>
                        </div>

                        <div class="input-row">
                            <div class="field-label">แผนก</div>
                            <div class="field-input">
                                <div class="custom-select-wrapper">
                                    <button type="button" class="custom-select-btn" onclick="toggleDeptDropdown()">
                                        <span id="deptDisplay" class="placeholder">-- กรุณาเลือกแผนก --</span>
                                        <span class="select-arrow">▾</span>
                                    </button>
                                    <div class="custom-select-menu" id="deptMenu"></div>
                                </div>
                                <input type="hidden" id="deptSelect">
                            </div>
                        </div>

                        <div class="input-row">
                            <div class="field-label">ความเชี่ยวชาญ</div>
                            <div class="field-input">
                                <input type="text" id="expertiseInput">
                            </div>
                        </div>

                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn-secondary" onclick="cancelEdit()">ยกเลิก</button>
                    <button class="btn-primary" onclick="saveData()">บันทึก</button>
                </div>
            </div>
        </div>

    </main>
</div>

<!-- SUCCESS MODAL -->
<div id="successModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-icon-wrap">
            <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
                <circle cx="18" cy="18" r="18" fill="#22c55e"/>
                <path d="M10 18.5l5.5 5.5 10.5-11" stroke="#fff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <h2 id="modalTitle">สำเร็จ!</h2>
        <p id="modalMessage">บันทึกข้อมูลเรียบร้อยแล้ว</p>
        <button class="btn-confirm" onclick="closeModal()">ตกลง</button>
    </div>
</div>

</body>
</html>
