<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>

    <!-- เชื่อม CSS -->
    <link rel="stylesheet" href="../css/dashboard.css">
    <!-- เชื่อม JS -->
    <script src="../js/dashboard.js" defer></script>
</head>

<body>

<!-- HEADER -->
<header class="header">
    <div class="left-section">
      <div class="menu-icon" onclick="toggleSidebar()">☰</div>
      <img src="../../img/hospital.png" class="circle-img">
    </div>

    <div class="profile" onclick="goProfile()">
    <span>Admin 1</span>
    <div class="avatar" style="background-image: url('../../img/profile.png');"></div>
    
    </div>
</header>

<div class="container">

  <!-- SIDEBAR -->
<aside class="sidebar">
    <h3>เมนู</h3>
    <br>
    <a href="User_Dashboard.html" class="menu">จัดการผู้ใช้</a>
    
    <a href="dashboard.html" class="menu active">จัดการบุคลากร</a>

    <div class="logout" onclick="logout()">
        <img src="../../img/log out.png" class="logoutlogo">ออกจากระบบ
    </div>
</aside>

  <!-- MAIN -->
  <main class="main">

    

    <div class="top-bar">

        <!-- SEARCH -->
        <div class="search-box">
          <input type="text" class="search" placeholder="ค้นหา...">
          <img src="../../img/Search.png" class="search-icon">
        </div>
      
        <!-- ROLE -->
        <div class="role-dropdown">
          <div class="role-btn" onclick="toggleDropdown('dropdownMenu', this)">
            <span id="selectedRole">Role</span>
            <img src="../../img/arrow-down-sign-to-navigate.png" class="arrowdropdown">
          </div>
      
          <div id="dropdownMenu" class="dropdown-menu">
            <div onclick="filterRole('all')">All</div>
            <div onclick="filterRole('doctor')">Doctor</div>
            <div onclick="filterRole('staff')">Staff</div>
          </div>
        </div>
      
      </div>
      <div class="summary">
        <div class="card">
            <img src="../../img/doctor.png" class="icon">
            <div class="card-details">
                <h3>Doctor</h3>
                <p id="countDoctor">0 Users</p>  <!-- เพิ่ม id -->
            </div>
        </div>
        <div class="card">
            <img src="../../img/nurse.png" class="icon">
            <div class="card-details">
                <h3>Staff</h3>
                <p id="countStaff">0 Users</p>  <!-- เพิ่ม id -->
            </div>
        </div>
    </div>
<div class="grid" id="userGrid">
    </div>
  </main>
</div>


</body>
</html>
