<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>Edit Staff - Admin Dashboard</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/Staff_Edit_Add.css">
    <script src="../js/dashboard.js" defer></script>
    <script src="../js/Staff_Edit_Add.js" defer></script>
</head>

<body>

    <header class="header">
        <div class="left-section">
            <div class="menu-icon" onclick="toggleSidebar()">☰</div>
            <img src="../../img/hospital.png" class="circle-img">
        </div>
        <div class="profile" onclick="goProfile()">
            <span>Admin 1</span>
            <div class="avatar" style="background-image: url('../../img/profile.png');"></div>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <h3>เมนู</h3>
            <br>
            <a href="User_Dashboard.html" class="menu">จัดการผู้ใช้</a>
            <a href="dashboard.html" class="menu active">จัดการบุคลากร</a>
            <div class="logout" onclick="logout()">
                <img src="../../img/log out.png" class="logoutlogo">ออกจากระบบ
            </div>
        </aside>

        <main class="main">

            <div class="edit-card">
                <div class="edit-card-header">
                    <h3>แก้ไขข้อมูล</h3>
                </div>

                <div class="edit-card-body">
                    <div class="profile-layout">
                        <div class="profile-image-container">
                            <img src="../../img/staff_img1.png" alt="Profile" class="profile-main-img">
                        </div>

                        <div class="profile-details-form">
                            <div class="user-id-row">
                                <div class="user-meta">
                                    <span class="label">Username</span>
                                    <span class="value"></span>
                                </div>
                                <span class="role-badge staff"></span>
                            </div>

                            <hr class="divider">

                            <h2 class="display-name"></h2>

                            <div class="contact-info">
                                <span class="label">หมายเลขโทรศัพท์</span>
                                <span class="value"></span>
                            </div>

                            <div class="input-row staff-form-group">
                                <div class="field-label">ตำแหน่ง</div>
                                <div class="field-input">
                                    <select id="deptSelect" class="custom-select"></select>
                                </div>
                            </div>

                        </div>
                    </div>

                    <div class="action-buttons">
                        <button type="button" class="btn-secondary" onclick="cancelEdit()">ยกเลิก</button>
                        <button type="button" class="btn-primary" onclick="saveData()">บันทึก</button>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- SUCCESS MODAL -->
    <div id="successModal" class="modal-overlay">
        <div class="modal-content">
            <div id="modalIcon" class="modal-icon success">✓</div>
            <h2 id="modalTitle">สำเร็จ!</h2>
            <p id="modalMessage">บันทึกข้อมูลเรียบร้อยแล้ว</p>
            <button class="btn-confirm" onclick="closeModal()">ตกลง</button>
        </div>
    </div>

</body>
</html>
