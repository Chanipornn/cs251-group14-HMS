<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Edit User</title>
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="../css/Edit_Information.css">
  <script src="../js/Edit_Information.js" defer></script>
  <style>
    .field-locked {
      background-color: #f5f5f5 !important;
      cursor: not-allowed !important;
      color: #888 !important;
    }
    input:disabled, select:disabled {
      background-color: #f5f5f5;
      color: #888;
      cursor: not-allowed;
    }
    /* profile upload */
    .profile-upload-wrap {
      position: relative;
      width: 60px;
      height: 60px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .profile-img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }
    .upload-overlay {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .profile-upload-wrap:hover .upload-overlay { opacity: 1; }
    .upload-overlay svg { width: 22px; height: 22px; fill: white; }
    #profileFileInput { display: none; }
  </style>
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="left-section">
    <div class="menu-icon" onclick="toggleSidebar()">☰</div>
    <img src="../../img/hospital.png" class="circle-img">
  </div>
  <div class="profile">
    <span>Admin 1</span>
    <div class="avatar" style="background-image: url('../../img/profile.png');"></div>
  </div>
</header>

<div class="container">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h3>เมนู</h3><br>
    <a href="User_Dashboard.html" class="menu">จัดการผู้ใช้</a>
    <a href="dashboard.html" class="menu">จัดการบุคลากร</a>
    <div class="logout" onclick="logout()">
      <img src="../../img/log out.png" class="logoutlogo">ออกจากระบบ
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="form-container">

      <!-- HEADER -->
      <div class="form-header">

        <div class="profile-upload-wrap" onclick="document.getElementById('profileFileInput').click()">
          <img id="profilePreview" src="../../img/profile.jpg" class="profile-img">
          <div class="upload-overlay">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 15.2A3.2 3.2 0 1 0 12 8.8a3.2 3.2 0 0 0 0 6.4zm7-11.2h-1.4l-1.7-2H8.1L6.4 4H5A3 3 0 0 0 2 7v11a3 3 0 0 0 3 3h14a3 3 0 0 0 3-3V7a3 3 0 0 0-3-3zm-7 13a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
            </svg>
          </div>
        </div>
        <input type="file" id="profileFileInput" accept="image/*">

        <div class="user-info">
          <h3 id="username">Username</h3>
          <p id="email">email@gmail.com</p>
        </div>
        <div class="user-role" id="roleText">-</div>
      </div>

      <!-- BODY -->
      <div class="form-body">
        <form id="editForm">
          <!-- data-roles = role ที่จะแสดงฟิลนี้ (คั่นด้วย ,) -->
          <div class="form-grid">

            <!-- ชื่อผู้ใช้ — ทุก role -->
            <div class="form-group" data-roles="patient,doctor,staff,admin">
              <label>ชื่อผู้ใช้ *</label>
              <input type="text" id="name" placeholder="กรอกชื่อผู้ใช้">
            </div>

            <!-- กรุ๊ปเลือด — patient เท่านั้น -->
            <div class="form-group" data-roles="patient">
              <label>กรุ๊ปเลือด *</label>
              <div class="custom-dropdown">
                <div class="dropdown-selected" onclick="toggleDropdown(this)">
                  <span>เลือกกรุ๊ปเลือด</span>
                  <img src="../../img/arrow-down-sign-to-navigate.png" class="arrow">
                </div>
                <div class="dropdown-options">
                  <div onclick="selectOption(this, 'blood')">A</div>
                  <div onclick="selectOption(this, 'blood')">B</div>
                  <div onclick="selectOption(this, 'blood')">AB</div>
                  <div onclick="selectOption(this, 'blood')">O</div>
                </div>
              </div>
              <input type="hidden" id="blood">
            </div>

            <!-- อีเมล — ทุก role -->
            <div class="form-group" data-roles="patient,doctor,staff,admin">
              <label>อีเมล *</label>
              <input type="email" id="emailInput" placeholder="กรอกอีเมล">
            </div>

            <!-- โรคประจำตัว — patient เท่านั้น -->
            <div class="form-group" data-roles="patient">
              <label>โรคประจำตัว</label>
              <input type="text" id="disease" placeholder="กรอกโรคประจำตัว">
            </div>

            <!-- ชื่อ-นามสกุล — ทุก role -->
            <div class="form-group" data-roles="patient,doctor,staff,admin">
              <label>ชื่อ-นามสกุล *</label>
              <div class="inline-group">
                <input type="text" id="firstName" placeholder="กรอกชื่อ">
                <input type="text" id="lastName"  placeholder="กรอกนามสกุล">
              </div>
            </div>

            <!-- แพ้ยา — patient เท่านั้น -->
            <div class="form-group" data-roles="patient">
              <label>แพ้ยา</label>
              <input type="text" id="allergy" placeholder="กรอกยาที่แพ้">
            </div>

            <!-- บัตรประชาชน — patient เท่านั้น -->
            <div class="form-group" data-roles="patient">
              <label>หมายเลขบัตรประชาชน *</label>
              <input type="text" id="nationalId" disabled>
            </div>

            <!-- น้ำหนัก — patient เท่านั้น -->
            <div class="form-group" data-roles="patient">
              <label>น้ำหนัก (กก.) *</label>
              <input type="number" id="weight" placeholder="กรอกน้ำหนัก">
            </div>

            <!-- เพศ — patient เท่านั้น -->
            <div class="form-group" data-roles="patient">
              <label>เพศ</label>
              <input type="text" id="gender" disabled>
            </div>

            <!-- ส่วนสูง — patient เท่านั้น -->
            <div class="form-group" data-roles="patient">
              <label>ส่วนสูง (ซม.) *</label>
              <input type="number" id="height" placeholder="กรอกส่วนสูง">
            </div>

            <!-- วันเกิด — patient เท่านั้น -->
            <div class="form-group" data-roles="patient">
              <label>วันเกิด</label>
              <input type="text" id="birthdate" disabled>
            </div>

            <!-- สิทธิการรักษา — patient เท่านั้น -->
            <div class="form-group" data-roles="patient">
              <label>สิทธิการรักษา *</label>
              <input type="text" id="treatment" placeholder="สิทธิการรักษา">
            </div>

            <!-- เบอร์โทร — ทุก role -->
            <div class="form-group" data-roles="patient,doctor,staff,admin">
              <label>หมายเลขโทรศัพท์ *</label>
              <input type="text" id="phone" placeholder="กรอกหมายเลขโทรศัพท์">
            </div>

            <!-- Role — doctor, staff, admin เท่านั้น -->
            <div class="form-group" data-roles="doctor,staff,admin">
              <label>Role</label>
              <input type="text" id="role" placeholder="role">
            </div>

            <!-- ที่อยู่ — patient เท่านั้น -->
            <div class="form-group full" data-roles="patient">
              <label>ที่อยู่ *</label>
              <input type="text" id="address" placeholder="กรอกที่อยู่ปัจจุบัน">
            </div>

            <!-- สถานะ — doctor, staff, admin เท่านั้น -->
            <div class="form-group" data-roles="doctor,staff,admin">
              <label>สถานะ</label>
              <input type="text" id="status" placeholder="สถานะ">
            </div>

          </div>

          <!-- BUTTON -->
          <div class="btn-group">
            <button type="button" class="cancel-btn"
              onclick="window.location.href='User_Dashboard.html'">ยกเลิก</button>
            <button type="submit" class="save-btn">บันทึก</button>
          </div>

        </form>
      </div>

    </div>
  </main>

</div>
</body>
</html>
