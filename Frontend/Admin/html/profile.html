<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Profile</title>

<link rel="stylesheet" href="../css/dashboard.css">
<link rel="stylesheet" href="../css/profile.css">

<script src="../js/profile.js" defer></script>
</head>

<body>

<!-- HEADER (เหมือน dashboard 100%) -->
<header class="header">
  <div class="left-section">
    <div class="menu-icon" onclick="toggleSidebar()">☰</div>
    <img src="../../img/hospital.png" class="circle-img">
  </div>

  <!-- เพิ่ม onclick + structure ให้เหมือน dashboard -->
  <div class="profile" onclick="goProfile()">
    <span id="headerName">Admin 1</span>
    <div class="avatar" id="headerAvatar"></div>
  </div>
</header>

<div class="container">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h3>เมนู</h3>
    <br>

    <!-- เพิ่ม active ให้เหมือน dashboard -->
    <a href="User_Dashboard.html" class="menu">จัดการผู้ใช้</a>
    <a href="dashboard.html" class="menu">จัดการบุคลากร</a>

    <div class="logout" onclick="logout()">
      <img src="../../img/log out.png" class="logoutlogo">
      ออกจากระบบ
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <div class="profile-card">

      <!-- รูป -->
      <div class="profile-img-wrapper" onclick="document.getElementById('imageUpload').click()">
        <img src="../../img/profile.jpg" id="profileImage" class="profile-img">
        <div class="edit-icon">✎</div>
        <input type="file" id="imageUpload" accept="image/*" hidden>
      </div>

      <!-- USER -->
      <h3 id="username">Username</h3>
      <p id="email">email@gmail.com</p>

      <!-- EDITABLE -->
      <div class="info-row">
        <span>ชื่อ</span>
        <p id="firstName">-</p>
        <div class="edit-icon small" onclick="editField('firstName')">✎</div>
      </div>

      <div class="info-row">
        <span>นามสกุล</span>
        <p id="lastName">-</p>
        <div class="edit-icon small" onclick="editField('lastName')">✎</div>
      </div>

      <div class="info-row">
        <span>หมายเลขโทรศัพท์</span>
        <p id="phone">-</p>
        <div class="edit-icon small" onclick="editField('phone')">✎</div>
      </div>

    </div>

  </main>

</div>
<!-- EDIT MODAL -->
<div id="editModal" class="modal">
    <div class="modal-box">
      <h3>แก้ไขข้อมูล</h3>
  
      <input type="text" id="editInput">
  
      <div class="modal-actions">
        <button class="cancel-btn" onclick="closeModal()">ยกเลิก</button>
        <button class="ok-btn" onclick="saveEdit()">ตกลง</button>
      </div>
    </div>
  </div>
</body>
</html>
