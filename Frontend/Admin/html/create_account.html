<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Create User</title>

  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="../css/Edit_Information.css">
  <link rel="stylesheet" href="../css/create_account.css">

  <script src="../js/create_account.js" defer></script>
</head>

<body>

<header class="header">
  <div class="left-section">
    <div class="menu-icon" onclick="toggleSidebar()">☰</div>
    <img src="../../img/hospital.png" class="circle-img">
  </div>

  <div class="profile">
    <span>Admin 1</span>
    <div class="avatar" style="background-image: url('../../img/profile.png');"></div>
  </div>
</header>

<div class="container">

  <aside class="sidebar">
    <h3>เมนู</h3><br>
    <a href="User_Dashboard.html" class="menu">จัดการผู้ใช้</a>
    <a href="dashboard.html" class="menu">จัดการบุคลากร</a>

    <div class="logout" onclick="logout()">
      <img src="../../img/log out.png" class="logoutlogo">ออกจากระบบ
    </div>
  </aside>

  <main class="main">

    <div class="form-container">

      <div class="form-header">
        <img src="../../img/profile.jpg" class="profile-img">
        <div class="user-info">
          <h3>Create User</h3>
          <p id="formSubtitle">สำหรับ Patient</p>
        </div>
      </div>

      <div class="form-body">

        <form id="createForm">

          <!-- ROLE -->
          <div class="form-group full">
            <label>Role *</label>

            <div class="role-selector">
              <button type="button" class="role-btn active" data-role="patient">Patient</button>
              <button type="button" class="role-btn" data-role="admin">Admin</button>
              <button type="button" class="role-btn" data-role="doctor">Doctor</button>
              <button type="button" class="role-btn" data-role="staff">Staff</button>
            </div>

            <input type="hidden" id="role" value="patient">
          </div>

          <!-- ========================= -->
          <!-- ACCOUNT FORM -->
          <!-- ========================= -->
          <div id="accountForm" style="display:none;">
            <div class="form-grid">

              <div class="form-group">
                <label>ชื่อผู้ใช้ *</label>
                <input type="text" id="name">
              </div>

              <div class="form-group">
                <label>อีเมล *</label>
                <input type="email" id="email">
              </div>

              <div class="form-group">
                <label>รหัสผ่าน *</label>
                <input type="password" id="password">
              </div>

              <div class="form-group">
                <label>ยืนยันรหัสผ่าน *</label>
                <input type="password" id="confirmPassword">
              </div>

              <div class="form-group">
                <label>เบอร์โทร *</label>
                <input type="text" id="phone">
              </div>

            </div>
          </div>

          <!-- ========================= -->
          <!-- PATIENT FORM -->
          <!-- ========================= -->
          <div id="patientForm">

            <div class="form-grid">

              <div class="form-group">
                <label>ชื่อผู้ใช้ *</label>
                <input type="text">
              </div>

              <div class="form-group">
                <label>อีเมล *</label>
                <input type="email">
              </div>

              <div class="form-group">
                <label>น้ำหนัก *</label>
                <input type="text">
              </div>

              <div class="form-group">
                <label>ส่วนสูง *</label>
                <input type="text">
              </div>

            </div>

          </div>

          <div class="btn-group">
            <button type="button" class="cancel-btn" onclick="goBack()">ยกเลิก</button>
            <button type="submit" class="save-btn">สร้างผู้ใช้</button>
          </div>

        </form>

      </div>

    </div>

  </main>

</div>

</body>
</html>
