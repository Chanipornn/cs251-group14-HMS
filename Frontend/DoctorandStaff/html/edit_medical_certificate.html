<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>แก้ไขใบรับรองแพทย์</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body data-page="medical-edit">
  <div class="app-shell">
    <header class="topbar">
      <button class="hamburger"><i class="fa-solid fa-bars"></i></button>
      <button class="plus-btn" data-nav="create_medical_certificate.html"><i class="fa-solid fa-plus"></i></button>
    </header>
    <div class="layout">
      <aside class="sidebar">
        <nav class="nav-list">
          <a class="nav-item" href="#"><i class="fa-solid fa-notes-medical"></i>ประวัติการรักษา</a>
          <a class="nav-item" href="#"><i class="fa-solid fa-capsules"></i>การจ่ายยา</a>
          <a class="nav-item" href="#"><i class="fa-regular fa-clock"></i>การนัดหมาย</a>
          <a class="nav-item active" href="medical_certificate_history.html"><i class="fa-regular fa-file-lines"></i>การออกใบรับรองแพทย์</a>
          <a class="nav-item" href="invoice_history.html"><i class="fa-solid fa-file-invoice-dollar"></i>ใบแจ้งหนี้</a>
        </nav>
        <div class="profile-box">
          <div class="profile-info"><div class="profile-avatar"><i class="fa-regular fa-user"></i></div><span>นพ. วิรุต</span></div>
          <a href="#" class="logout-link"><i class="fa-solid fa-right-from-bracket"></i></a>
        </div>
      </aside>
      <main class="main">
        <div class="form-title">
          <button class="back-link" data-nav="medical_certificate_history.html"><i class="fa-solid fa-circle-arrow-left"></i></button>
          <h1>แก้ไขใบรับรองแพทย์</h1>
        </div>
        <form id="medicalCertificateForm">
          <div class="form-grid">
            <div class="form-group">
              <label>รหัสประจำตัวผู้ป่วย :</label>
              <input id="mcPatientId" class="input" readonly>
            </div>
            <div class="form-group">
              <label>รหัสประจำตัว แพทย์ :</label>
              <input id="mcDoctorId" class="input" readonly>
            </div>
            <div class="form-group full">
              <label>วันออกใบรับรองแพทย์ :</label>
              <input id="mcDate" type="date" class="input">
            </div>
            <div class="form-group full">
              <label>อาการ :</label>
              <textarea id="mcSymptoms" class="textarea"></textarea>
            </div>
            <div class="form-group full">
              <label>วัตถุประสงค์ในการออกใบรับรองแพทย์ :</label>
              <textarea id="mcPurpose" class="textarea"></textarea>
            </div>
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-secondary" data-nav="medical_certificate_history.html">ยกเลิก</button>
            <button type="submit" class="btn btn-primary">ยืนยัน</button>
          </div>
        </form>
      </main>
    </div>
  </div>
  <script src="../js/app.js"></script>
</body>
</html>
