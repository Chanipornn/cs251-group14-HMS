<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>จ่ายยา</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="../css/dispense-medication.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="left-section">
      <div class="menu-icon" onclick="toggleSidebar()">☰</div>
      <img src="../../img/hospital.png" class="circle-img" alt="Hospital Logo">
    </div>
    <div class="profile">
      <span>นพ.วิรุต</span>
      <div class="avatar" style="background-image: url('../../img/profile.png');"></div>
    </div>
  </header>

  <div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <h3>เมนู</h3>

      <nav class="nav-list">
        <a href="medical_history.html" class="menu">ประวัติการรักษา</a>
        <a href="history.html" class="menu active">การจ่ายยา</a>
        <a href="appointment.html" class="menu">การนัดหมาย</a>
        <a href="medical_certificate_history.html" class="menu">การออกใบรับรองแพทย์</a>
        <a href="invoice_history.html" class="menu">ใบแจ้งหนี้</a>
      </nav>

      <div class="logout" onclick="logout()">
        <i class="fa-solid fa-right-from-bracket"></i> ออกจากระบบ
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

      <!-- Page Title with back arrow -->
      <div class="form-title">
        <button class="back-link" onclick="window.location.href='history.html'">
          <i class="fa-solid fa-arrow-left"></i>
        </button>
        <h1>เพิ่มการสั่งยา</h1>
      </div>

      <!-- Form -->
      <div class="form-body">
        <!-- Row 1: รหัสประจำตัวผู้ป่วย + รหัสประจำตัวแพทย์ -->
        <div class="form-row-two">
          <div class="form-group">
            <label>รหัสประจำตัวผู้ป่วย :</label>
            <input class="input input-short" type="text" placeholder="เช่น 77990088" />
          </div>
          <div class="form-group">
            <label>รหัสประจำตัวแพทย์ :</label>
            <input class="input input-short" type="text" placeholder="เช่น 77990088" />
          </div>
        </div>

        <!-- Row 2: ชื่อยา -->
        <div class="form-group">
          <label>ชื่อยา :</label>
          <input class="input input-med" type="text" placeholder="เช่น พาราเซตามอล" />
        </div>

        <!-- Row 3: ปริมาณการใช้ยา -->
        <div class="form-group">
          <label>ปริมาณการใช้ยา :</label>
          <textarea class="textarea" placeholder="เช่น 2 ครั้งต่อวัน"></textarea>
        </div>

        <!-- Row 4: ระยะเวลาการใช้ยา -->
        <div class="form-group">
          <label>ระยะเวลาการใช้ยา :</label>
          <input class="input input-full" type="text" placeholder="เช่น 2สัปดาห์" />
        </div>

        <!-- Row 5: ข้อแนะนำการใช้ยา -->
        <div class="form-group">
          <label>ข้อแนะนำการใช้ยา :</label>
          <textarea class="textarea textarea-lg" placeholder="เช่น ควรรับประทานหลังอาหาร"></textarea>
        </div>
      </div>

      <!-- Actions -->
      <div class="form-actions">
        <button class="btn btn-secondary" onclick="window.location.href='history.html'">ยกเลิก</button>
        <button class="btn btn-primary" onclick="submitForm()">ยืนยัน</button>
      </div>

    </main>
  </div>

  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('collapsed');
    }
    function logout() {
      if (confirm('ต้องการออกจากระบบ?')) {
        window.location.href = 'login.html';
      }
    }
    function submitForm() {
      alert('บันทึกข้อมูลเรียบร้อย');
    }
  </script>
</body>
</html>
