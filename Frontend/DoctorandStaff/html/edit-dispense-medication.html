<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Edit Dispense Medication</title>
  <link rel="stylesheet" href="../css/edit-dispense-medication.css">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

  <div class="sidebar">
    <div class="menu">
      <div class="menu-item">ประวัติการรักษา</div>
      <div class="menu-item active">การจ่ายยา</div>
      <div class="menu-item">การนัดหมาย</div>
      <div class="menu-item">การออกใบรับรองแพทย์</div>
      <div class="menu-item">แบบฟอร์ม</div>
    </div>

    <div class="user">
      <span>นพ. วีระ</span>
    </div>
  </div>

  <div class="main">
    
    <div class="topbar">
      <div class="menu-icon">☰</div>
      <div class="add-btn">+</div>
    </div>

    <div class="content">
      <h2>← แก้ไขใบรายการจ่ายยา</h2>

      <div class="form-row">
        <div>
          <label>รหัสประจำตัวผู้ป่วย :</label>
          <input type="text" value="6780987">
        </div>
        <div>
          <label>รหัสประจำตัวแพทย์ :</label>
          <input type="text" value="1112222333">
        </div>
      </div>

      <div>
        <label>ชื่อยา :</label>
        <input type="text" value="Enalapril, Metformin">
      </div>

      <div>
        <label>ปริมาณการใช้ยา :</label>
        <textarea>รับประทานวันละ 2 ครั้งหลังอาหาร</textarea>
      </div>

      <div>
        <label>ระยะเวลาการใช้ยา :</label>
        <input type="text" value="1 เดือน">
      </div>

      <div>
        <label>ข้อแนะนำการใช้ยา :</label>
        <textarea>ถ้ามีอาการผิดปกติควรพบแพทย์</textarea>
      </div>

      <div class="buttons">
        <button class="cancel">ยกเลิก</button>
        <button class="confirm">ยืนยัน</button>
      </div>

    </div>
  </div>

</div>

</body>
</html>
