<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>แก้ไขรายการสั่งยา</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="../css/edit-dispense-medication.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="left-section">
      <div class="menu-icon" onclick="toggleSidebar()">☰</div>
      <img src="../../img/hospital.png" class="circle-img" alt="Hospital Logo">
    </div>
    <div class="profile">
      <span>นพ.วิรุต</span>
      <div class="avatar" style="background-image: url('../../img/profile.png');"></div>
    </div>
  </header>

  <div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <h3>เมนู</h3>

      <nav class="nav-list">
        <a href="medical_history.html" class="menu">ประวัติการรักษา</a>
        <a href="history.html" class="menu active">การจ่ายยา</a>
        <a href="appointment.html" class="menu">การนัดหมาย</a>
        <a href="medical_certificate_history.html" class="menu">การออกใบรับรองแพทย์</a>
        <a href="invoice_history.html" class="menu">ใบแจ้งหนี้</a>
      </nav>

      <div class="logout" onclick="logout()">
        <i class="fa-solid fa-right-from-bracket"></i> ออกจากระบบ
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

      <!-- Page Title -->
      <div class="form-title">
        <button class="back-link" onclick="window.location.href='history.html'">
          <i class="fa-solid fa-arrow-left"></i>
        </button>
        <h1>แก้ไขใบรายการจ่ายยา</h1>
      </div>

      <!-- Form -->
      <div class="form-body">

        <div class="form-row-two">
          <div class="form-group inline">
            <label>รหัสประจำตัวผู้ป่วย :</label>
            <input class="input input-short" type="text" value="6780987" />
          </div>
          <div class="form-group inline">
            <label>รหัสประจำตัวแพทย์ :</label>
            <input class="input input-short" type="text" value="1112222333" />
          </div>
        </div>

        <div class="form-group inline">
          <label>ชื่อยา :</label>
          <input class="input input-med" type="text" value="Enalapril, Metformin" />
        </div>

        <div class="form-group block">
          <label>ปริมาณการใช้ยา :</label>
          <textarea class="textarea">รับประทานวันละ 2 ครั้งหลังอาหาร</textarea>
        </div>

        <div class="form-group block">
          <label>ระยะเวลาการใช้ยา :</label>
          <input class="input input-full" type="text" value="1 เดือน" />
        </div>

        <div class="form-group block">
          <label>ข้อแนะนำการใช้ยา :</label>
          <textarea class="textarea">ถ้ารับประทานแล้วอาเจียนควรรีบพบแพทย์</textarea>
        </div>

      </div>

      <!-- Actions -->
      <div class="form-actions">
        <button class="btn btn-secondary" onclick="window.location.href='history.html'">ยกเลิก</button>
        <button class="btn btn-primary" onclick="showModal()">ยืนยัน</button>
      </div>

    </main>
  </div>

  <!-- SUCCESS MODAL -->
  <div id="successModal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-icon-wrap">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <circle cx="18" cy="18" r="18" fill="#22c55e"/>
          <path d="M10 18.5l5.5 5.5 10.5-11" stroke="#fff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2>สำเร็จ!</h2>
      <p>บันทึกการแก้ไขเรียบร้อยแล้ว</p>
      <button class="btn-confirm" onclick="closeModal()">ตกลง</button>
    </div>
  </div>

  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('collapsed');
    }
    function logout() {
      if (confirm('ต้องการออกจากระบบ?')) {
        window.location.href = 'login.html';
      }
    }
    function showModal() {
      document.getElementById('successModal').classList.add('show');
    }
    function closeModal() {
      document.getElementById('successModal').classList.remove('show');
      window.location.href = 'history.html';
    }
  </script>
</body>
</html>
