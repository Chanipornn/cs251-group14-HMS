<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>สร้างใบแจ้งหนี้</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body data-page="invoice-create">
  <div class="app-shell">
    <header class="topbar">
      <button class="hamburger"><i class="fa-solid fa-bars"></i></button>
      <button class="plus-btn" data-nav="create_invoice.html"><i class="fa-solid fa-plus"></i></button>
    </header>
    <div class="layout">
      <aside class="sidebar">
        <nav class="nav-list">
          <a class="nav-item" href="#"><i class="fa-solid fa-notes-medical"></i>ประวัติการรักษา</a>
          <a class="nav-item" href="#"><i class="fa-solid fa-capsules"></i>การจ่ายยา</a>
          <a class="nav-item" href="#"><i class="fa-regular fa-clock"></i>การนัดหมาย</a>
          <a class="nav-item" href="medical_certificate_history.html"><i class="fa-regular fa-file-lines"></i>การออกใบรับรองแพทย์</a>
          <a class="nav-item active" href="invoice_history.html"><i class="fa-solid fa-file-invoice-dollar"></i>ใบแจ้งหนี้</a>
        </nav>
        <div class="profile-box">
          <div class="profile-info"><div class="profile-avatar"><i class="fa-regular fa-user"></i></div><span>นพ. วิรุต</span></div>
          <a href="#" class="logout-link"><i class="fa-solid fa-right-from-bracket"></i></a>
        </div>
      </aside>
      <main class="main">
        <div class="form-title">
          <button class="back-link" data-nav="invoice_history.html"><i class="fa-solid fa-circle-arrow-left"></i></button>
          <h1>สร้างใบแจ้งหนี้</h1>
        </div>
        <form id="invoiceForm">
          <div class="form-grid">
            <div class="form-group">
              <label>รหัสผู้ป่วย :</label>
              <input id="invoicePatientId" class="input" value="254623">
            </div>
            <div class="form-group">
              <label>รหัสการรักษา :</label>
              <input id="invoiceTreatmentId" class="input" value="1112222333">
            </div>
            <div class="form-group full">
              <div class="table-wrap">
                <table class="data-table">
                  <thead>
                    <tr><th>ลำดับ</th><th>รายการ</th><th>ราคา</th></tr>
                  </thead>
                  <tbody id="invoiceItemsBody"></tbody>
                </table>
              </div>
              <div class="table-tools"><a href="#" id="addItemLink" class="add-inline"><i class="fa-regular fa-square-plus"></i> Add</a></div>
            </div>
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-secondary" data-nav="invoice_history.html">ยกเลิก</button>
            <button type="submit" class="btn btn-primary">ยืนยัน</button>
          </div>
        </form>
      </main>
    </div>
  </div>
  <script src="../js/app.js"></script>
</body>
</html>
