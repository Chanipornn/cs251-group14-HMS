<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <title>เพิ่มการนัดหมาย</title>
  <link rel="stylesheet" href="../css/appointment-styles.css">
</head>
<body>
<div class="page-wrap">

<header class="header">
  <div class="left-section">
    <div class="menu-icon" onclick="toggleSidebar()">☰</div>
    <img src="../../img/hospital.png" class="circle-img" onerror="this.style.display='none'">
  </div>

  <div class="profile">
    <span>นพ.วิรุต</span>
    <div class="avatar" style="background-image: url('../../img/profile.png');"></div>
  </div>
</header>

<div class="container">

<aside class="sidebar" id="sidebar">
  <h3>เมนู</h3>

  <a href="medical_history.html" class="menu">ประวัติการรักษา</a>
  <a href="history.html" class="menu">การจ่ายยา</a>
  <a href="appointment.html" class="menu active">การนัดหมาย</a>
  <a href="medical_certificate_history.html" class="menu">การออกใบรับรองแพทย์</a>
  <a href="invoice_history.html" class="menu">ใบแจ้งหนี้</a>

  <div class="logout" onclick="logout()">
    <img src="../../img/log out.png" class="logoutlogo" onerror="this.style.display='none'">ออกจากระบบ
  </div>
</aside>

  <main class="main">
    <div class="form-title">
      <button class="back-link" type="button" onclick="location.href='appointment.html'"><i class="fa-solid fa-arrow-left"></i></button>
      <h1>เพิ่มการนัดหมาย</h1>
    </div>

    <form class="appointment-form" id="appointmentForm">
      <div class="row">
        <label>รหัสประจำตัวผู้ป่วย :</label>
        <input type="text" id="patientId" value="6780987" required>
        <label>รหัสประจำตัวแพทย์ :</label>
        <input type="text" id="doctorId" value="1112222333" required>
      </div>

      <div class="row single">
        <label>วันที่นัดหมาย :</label>
        <input type="date" id="appointmentDate" value="2026-03-30" required>
      </div>

      <div class="row single">
        <label>เวลาที่นัดหมาย :</label>
        <input type="time" id="appointmentTime" value="10:00" required>
      </div>

      <div class="row single">
        <label>รหัสประจำตัวแพทย์เจ้าของเคส :</label>
        <input type="text" id="caseDoctorId" value="1112222333" required>
      </div>
    </form>

    <div class="form-actions">
      <button class="btn btn-secondary" type="button" onclick="location.href='appointment.html'">ยกเลิก</button>
      <button class="btn btn-primary" type="submit" form="appointmentForm">ยืนยัน</button>
    </div>

  </main>
</div>
</div>

<script src="../JS/appointment.js"></script>
</body>
</html>
