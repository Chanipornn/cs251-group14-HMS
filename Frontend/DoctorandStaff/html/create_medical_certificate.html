<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>สร้างใบรับรองแพทย์</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/medical_certificate.css">
</head>
<body data-page="medical-create">
  <header class="header">
    <div class="left-section">
      <div class="menu-icon" onclick="toggleSidebar()">☰</div>
      <img src="../../img/hospital.png" class="circle-img" alt="Hospital Logo">
    </div>

    <div class="profile">
      <span>นพ.วิรุต</span>
      <div class="avatar" style="background-image: url('../../img/profile.png');"></div>
    </div>
  </header>

  <div class="container">
    <aside class="sidebar">
      <h3>เมนู</h3><br>

      <a href="medical_history.html" class="menu">ประวัติการรักษา</a>
      <a href="history.html" class="menu">การจ่ายยา</a>
      <a href="appointment.html" class="menu">การนัดหมาย</a>
      <a href="medical_certificate_history.html" class="menu active">การออกใบรับรองแพทย์</a>
      <a href="invoice_history.html" class="menu">ใบแจ้งหนี้</a>

      <div class="logout" onclick="logout()">
        <img src="../../img/log out.png" class="logoutlogo" alt="Logout">ออกจากระบบ
      </div>
    </aside>

    <main class="main">
      <div class="form-title">
        <button class="back-link" data-nav="medical_certificate_history.html"><i class="fa-solid fa-arrow-left"></i></button>
        <h1>สร้างใบรับรองแพทย์</h1>
      </div>
      <form id="medicalCertificateForm">
        <div class="form-grid">
          <div class="form-group">
            <label>รหัสประจำตัวผู้ป่วย :</label>
            <input id="mcPatientId" class="input" placeholder="เช่น P001" required>
          </div>
          <div class="form-group">
            <label>รหัสประจำตัว แพทย์ :</label>
            <input id="mcDoctorId" class="input" placeholder="เช่น D001" required>
          </div>
          <div class="form-group full">
            <label>วันออกใบรับรองแพทย์ :</label>
            <input id="mcDate" type="date" class="input" required>
          </div>
          <div class="form-group full">
            <label>อาการ :</label>
            <textarea id="mcSymptoms" class="textarea" required placeholder="เช่น มีไข้"></textarea>
          </div>
          <div class="form-group full">
            <label>วัตถุประสงค์ในการออกใบรับรองแพทย์ :</label>
            <textarea id="mcPurpose" class="textarea" required placeholder="เช่น ลางาน"></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" data-nav="medical_certificate_history.html">ยกเลิก</button>
          <button type="submit" class="btn btn-primary">ยืนยัน</button>
        </div>
      </form>

    </main>
  </div>
  <script src="../js/app.js"></script>
</body>
</html>
