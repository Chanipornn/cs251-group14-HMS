<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เพิ่มประวัติการรักษา</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/create_medical_history.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/medical_history.css">
</head>
<body>

    <!-- HEADER -->
<header class="header">
  <div class="left-section">
    <div class="menu-icon" id="sidebarToggle">☰</div>
    <img src="../../img/hospital.png" class="circle-img">
  </div>

  <div class="profile">
    <span>นพ.วิรุต</span>
    <div class="avatar" style="background-image: url('../../img/profile.png');"></div>
  </div>
</header>

    <div class="container">
        
        <!-- SIDEBAR -->
  <aside class="sidebar">
    <h3>เมนู</h3><br>

    <a href="medical_history.html" class="menu active">ประวัติการรักษา</a>
    <a href="history.html" class="menu">การจ่ายยา</a>
    <a href="appointment.html" class="menu">การนัดหมาย</a>
    <a href="medical_certificate_history.html" class="menu">การออกใบรับรองแพทย์</a>
    <a href="invoice_history.html" class="menu">ใบแจ้งหนี้</a>

    <div class="logout" onclick="logout()">
      <img src="../../img/log out.png" class="logoutlogo">ออกจากระบบ
    </div>
  </aside>

        <main class="main-content">
            <section class="form-container">
                <div class="form-header">
                    <a href="medical_history.html" class="back-btn-circle">
                        <i class="fa-solid fa-arrow-left"></i>
                    </a>
                    <h1 class="form-title">เพิ่มประวัติการรักษา</h1>
                </div>

                <form id="historyForm" class="medical-form">
                    <div class="form-row">
                        <div class="input-group">
                            <label>รหัสประจำตัวผู้ป่วย :</label>
                            <input type="text" id="patientId" placeholder="เช่น 256893">
                        </div>
                        <div class="input-group">
                            <label>รหัสประจำตัวแพทย์ :</label>
                            <input type="text" id="doctorId" placeholder="เช่น 77990088">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label>วันที่เข้าพบแพทย์ :</label>
                            <input type="date" id="visitDate">
                        </div>
                    </div>

                    <div class="input-group full-width">
                        <label>อาการ :</label>
                        <textarea id="symptoms" rows="3" placeholder="เช่น มีไข้ ตัวร้อน"></textarea>
                    </div>

                    <div class="input-group full-width">
                        <label>การวินิจฉัย :</label>
                        <input type="text" id="diagnosis" placeholder="เช่น เป็นไข้หวัดใหญ่">
                    </div>

                    <div class="input-group full-width">
                        <label>ผลการรักษา :</label>
                        <textarea id="treatmentResult" rows="3" placeholder="เช่น ติดตามอาการ"></textarea>
                    </div>

                    <div class="input-group full-width">
                        <label>รายละเอียดการรักษา :</label>
                        <textarea id="treatmentDetail" rows="3" placeholder="เช่น มีการซักถามประวัติ"></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-cancel" onclick="history.back()">ยกเลิกการแก้ไข</button>
                        <button type="submit" class="btn-confirm">ยืนยันแก้ไข</button>
                    </div>
                </form>
            </section>
        </main>
    </div>

</body>
    <script src="../js/medical_history.js"></script>
</html>
