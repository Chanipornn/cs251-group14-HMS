<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ประวัติการจ่ายยา ไม่พบข้อมูล</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="../css/history-empty.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="left-section">
      <div class="menu-icon" onclick="toggleSidebar()">☰</div>
      <img src="../../img/hospital.png" class="circle-img" alt="Hospital Logo">
    </div>
    <div class="profile">
      <span>นพ.วิรุต</span>
      <div class="avatar" style="background-image: url('../../img/profile.png');"></div>
    </div>
  </header>

  <div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <h3>เมนู</h3>

      <nav class="nav-list">
        <a href="medical_history.html" class="menu">ประวัติการรักษา</a>
        <a href="history.html" class="menu active">การจ่ายยา</a>
        <a href="appointment.html" class="menu">การนัดหมาย</a>
        <a href="medical_certificate_history.html" class="menu">การออกใบรับรองแพทย์</a>
        <a href="invoice_history.html" class="menu">ใบแจ้งหนี้</a>
      </nav>

      <div class="logout" onclick="logout()">
        <i class="fa-solid fa-right-from-bracket"></i> ออกจากระบบ
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

      <!-- Search Row -->
      <div class="search-row">
        <div class="search-box">
          <input type="text" id="searchInput" value="6400013" />
          <button class="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
      </div>

      <!-- Page Title -->
      <div class="page-title">
        <h1>ประวัติการจ่ายยา</h1>
      </div>

      <!-- Empty State Panel -->
      <div class="empty-panel">
        <p class="empty-text">ไม่พบข้อมูลคนไข้*</p>
      </div>

      <!-- Add Button -->
      <div class="add-row">
        <button class="add-link" onclick="window.location.href='dispense-medication.html'">
          + เพิ่มรายการจ่ายยา
        </button>
      </div>

    </main>
  </div>

  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('collapsed');
    }
    function logout() {
      if (confirm('ต้องการออกจากระบบ?')) {
        window.location.href = 'login.html';
      }
    }
  </script>
</body>
</html>
