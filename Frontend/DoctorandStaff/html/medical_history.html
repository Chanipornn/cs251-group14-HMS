<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการประวัติการรักษา</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/medical_history.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- HEADER -->
<header class="header">
  <div class="left-section">
    <div class="menu-icon" id="sidebarToggle">☰</div>
    <img src="../../img/hospital.png" class="circle-img">
  </div>

  <div class="profile">
    <span>นพ.วิรุต</span>
    <div class="avatar" style="background-image: url('../../img/profile.png');"></div>
  </div>
</header>

    <div class="container">
        
        <!-- SIDEBAR -->
  <aside class="sidebar">
    <h3>เมนู</h3><br>

    <a href="medical_history.html" class="menu active">ประวัติการรักษา</a>
    <a href="history.html" class="menu">การจ่ายยา</a>
    <a href="appointment.html" class="menu">การนัดหมาย</a>
    <a href="medical_certificate_history.html" class="menu">การออกใบรับรองแพทย์</a>
    <a href="invoice_history.html" class="menu">ใบแจ้งหนี้</a>

    <div class="logout" onclick="logout()">
      <img src="../../img/log out.png" class="logoutlogo">ออกจากระบบ
    </div>
  </aside>

        <main class="main-content">
            <div class="content-body">
                
                <section class="stats-cards">
                    <div class="date-selector">
                        <i class="fa-solid fa-chevron-left" id="prevDate" style="cursor: pointer;"></i> 
                        <span id="currentDateText">กำลังโหลด...</span> 
                        <i class="fa-solid fa-chevron-right" id="nextDate" style="cursor: pointer;"></i>
                    </div>

                    <div class="cards-wrapper">
                        <div class="card card-cyan">
                            <h2 id="statCompleted">0</h2>
                            <p>เคสที่รักษาเสร็จสิ้น</p>
                        </div>
                        <div class="card card-purple">
                            <h2 id="statToday">0</h2>
                            <p>เคสที่ต้องรักษาวันนี้</p>
                        </div>
                        <div class="card card-blue">
                            <h2 id="statTotal">0</h2>
                            <p>การรักษาทั้งหมด</p>
                        </div>
                    </div>
                </section>

                <section class="table-section">
                    <div class="table-controls">
                        <h3 class="table-title">เคสที่รักษาทั้งหมด</h3>
                        
                        <div class="search-container">
                            <input type="text" id="patientSearch" placeholder="กรุณากรอกรหัสผู้ป่วย">
                            <i class="fa-solid fa-magnifying-glass search-icon"></i>
                        </div>

                        <button class="btn-add-record" onclick="location.href='create_medical_history.html'">
                            <i class="fa-solid fa-plus"></i> เพิ่มประวัติการรักษา
                        </button>
                    </div>

                    <div class="table-wrapper">
                        <table class="history-table">
                            <thead>
                                <tr>
                                    <th>รหัสประจำตัวผู้ป่วย</th>
                                    <th>ชื่อ - นามสกุล</th>
                                    <th>วันที่ทำการรักษา</th>
                                    <th>การวินิจฉัย</th>
                                </tr>
                            </thead>
                            <tbody id="historyTableBody">
                                <tr>
                                    <td colspan="4" style="text-align:center; padding: 50px; color: #999;">
                                        กำลังโหลดข้อมูล...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>

            </div> </main>

    </div> 

</body>
 <script src="../js/medical_history.js"></script>
</html>
