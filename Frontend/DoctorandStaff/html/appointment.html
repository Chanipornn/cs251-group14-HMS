<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>การนัด</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="../css/appointment.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="left-section">
      <div class="menu-icon" onclick="toggleSidebar()">☰</div>
      <img src="../../img/hospital.png" class="circle-img" alt="Hospital Logo">
    </div>
    <div class="profile">
      <span>นพ.วิรุต</span>
      <div class="avatar" style="background-image: url('../../img/profile.png');"></div>
    </div>
  </header>

  <div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <h3>เมนู</h3>

      <nav class="nav-list">
        <a href="medical_history.html" class="menu">ประวัติการรักษา</a>
        <a href="history.html" class="menu">การจ่ายยา</a>
        <a href="appointment.html" class="menu active">การนัดหมาย</a>
        <a href="medical_certificate_history.html" class="menu">การออกใบรับรองแพทย์</a>
        <a href="invoice_history.html" class="menu">ใบแจ้งหนี้</a>
      </nav>

      <div class="logout" onclick="logout()">
        <i class="fa-solid fa-right-from-bracket"></i> ออกจากระบบ
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

      <div class="page-title">
        <h1>รายการนัดหมาย</h1>
      </div>

      <div class="search-row">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="PatientID / DoctorID" />
          <button class="search-btn" onclick="renderAppointments()"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
      </div>

      <div class="sort-row">
        <span class="sort-label" onclick="toggleSort()">
          หมายเลขคิว
          <i class="fa-solid fa-sliders" id="sortIcon"></i>
        </span>
      </div>

      <div class="card-list" id="cardList"></div>

      <div class="add-row">
        <button class="add-link" onclick="window.location.href='add-appointment.html'">
          + เพิ่มการนัดหมาย
        </button>
      </div>

    </main>
  </div>

  <script>
    const STORAGE_KEY = 'appointments_data';

    const defaultAppointments = [
      {
        id: 'apt-1',
        queue: 1,
        date: '2026-03-25',
        time: '09:00',
        patientId: '6780987',
        doctorId: '1112222333',
        caseDoctorId: '1112222333',
        name: 'น.ส. โยมิว แก้วหวาน',
        age: 25,
        weight: 55,
        height: 165
      },
      {
        id: 'apt-2',
        queue: 2,
        date: '2026-03-25',
        time: '09:30',
        patientId: '6780988',
        doctorId: '1112222333',
        caseDoctorId: '1112222333',
        name: 'นาย นวัต ตะสังโดน',
        age: 21,
        weight: 60,
        height: 160
      },
      {
        id: 'apt-3',
        queue: 3,
        date: '2026-03-25',
        time: '10:00',
        patientId: '6780989',
        doctorId: '1112222333',
        caseDoctorId: '1112222333',
        name: 'น.ส. บากินตา อิบาบู',
        age: 44,
        weight: 70,
        height: 155
      }
    ];

    let sortAsc = true;

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('collapsed');
    }

    function logout() {
      if (confirm('ต้องการออกจากระบบ?')) {
        window.location.href = 'login.html';
      }
    }

    function getAppointments() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultAppointments));
        return defaultAppointments;
      }
      return JSON.parse(saved);
    }

    function saveAppointments(appointments) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(appointments));
    }

    function formatThaiDate(dateText) {
      if (!dateText) return '-';
      const [year, month, day] = dateText.split('-');
      return `${day}/${month}/${Number(year) + 543}`;
    }

    function padQueue(num) {
      return String(num).padStart(2, '0');
    }

    function renderAppointments() {
      const list = document.getElementById('cardList');
      const keyword = document.getElementById('searchInput').value.trim().toLowerCase();

      let appointments = getAppointments();
      appointments.sort((a, b) => sortAsc ? a.queue - b.queue : b.queue - a.queue);

      if (keyword) {
        appointments = appointments.filter(item =>
          String(item.patientId).toLowerCase().includes(keyword) ||
          String(item.doctorId).toLowerCase().includes(keyword) ||
          String(item.caseDoctorId).toLowerCase().includes(keyword)
        );
      }

      list.innerHTML = '';

      if (appointments.length === 0) {
        list.innerHTML = '<p style="padding:20px; color:#777;">ไม่พบรายการนัดหมาย</p>';
        return;
      }

      appointments.forEach(item => {
        const card = document.createElement('div');
        card.className = 'appoint-card';
        card.dataset.queue = item.queue;
        card.innerHTML = `
          <div class="card-body">
            <p class="card-date">วันที่ : ${formatThaiDate(item.date)}</p>
            <p>ชื่อ : ${item.name || 'ผู้ป่วยรหัส ' + item.patientId}</p>
            <p>อายุ : ${item.age || '-'} ปี</p>
            <p>น้ำหนัก : ${item.weight || '-'} กก.</p>
            <p>ส่วนสูง : ${item.height || '-'} ซม.</p>
            <p>เวลา : ${item.time || '-'}</p>
            <p>PatientID : ${item.patientId || '-'}</p>
            <p>DoctorID : ${item.doctorId || '-'}</p>
          </div>
          <div class="card-meta">
            <span class="queue-label">หมายเลขคิว : ${padQueue(item.queue)}</span>
            <button class="edit-btn" onclick="goEdit('${item.id}')"><i class="fa-regular fa-pen-to-square"></i></button>
          </div>
        `;
        list.appendChild(card);
      });
    }

    function goEdit(id) {
      window.location.href = `edit-appointment.html?id=${encodeURIComponent(id)}`;
    }

    function toggleSort() {
      sortAsc = !sortAsc;
      const icon = document.getElementById('sortIcon');
      icon.style.transform = sortAsc ? 'rotate(0deg)' : 'rotate(180deg)';
      icon.style.transition = 'transform 0.3s';
      renderAppointments();
    }

    document.getElementById('searchInput').addEventListener('input', renderAppointments);
    renderAppointments();
  </script>
</body>
</html>
