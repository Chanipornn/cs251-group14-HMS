<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แก้ไขการนัดหมาย</title>
  <link rel="stylesheet" href="../css/appointment-styles.css">
</head>
<body>
<div class="page-wrap">

<header class="header">
  <div class="left-section">
    <div class="menu-icon" onclick="toggleSidebar()">☰</div>
    <img src="../../img/hospital.png" class="circle-img" onerror="this.style.display='none'">
  </div>

  <div class="profile">
    <span>นพ.วิรุต</span>
    <div class="avatar" style="background-image: url('../../img/profile.png');"></div>
  </div>
</header>

<div class="container">

<aside class="sidebar" id="sidebar">
  <h3>เมนู</h3>

  <a href="medical_history.html" class="menu">ประวัติการรักษา</a>
  <a href="history.html" class="menu">การจ่ายยา</a>
  <a href="appointment.html" class="menu active">การนัดหมาย</a>
  <a href="medical_certificate_history.html" class="menu">การออกใบรับรองแพทย์</a>
  <a href="invoice_history.html" class="menu">ใบแจ้งหนี้</a>

  <div class="logout" onclick="logout()">
    <img src="../../img/log out.png" class="logoutlogo" onerror="this.style.display='none'">ออกจากระบบ
  </div>
</aside>

  <main class="main">
    <div class="form-title">
      <button class="back-link" type="button" onclick="location.href='appointment.html'">‹</button>
      <h1>แก้ไขการนัดหมาย</h1>
    </div>

    <form class="appointment-form" id="editAppointmentForm">
      <div class="row">
        <label>รหัสประจำตัวผู้ป่วย :</label>
        <input type="text" id="patientId" required>
        <label>รหัสประจำตัว แพทย์/เจ้าหน้าที่ :</label>
        <input type="text" id="doctorId" required>
      </div>

      <div class="row single">
        <label>วันที่นัดหมาย :</label>
        <input type="date" id="appointmentDate" required>
      </div>

      <div class="row single">
        <label>เวลาที่นัดหมาย :</label>
        <input type="time" id="appointmentTime" required>
      </div>

      <div class="row single">
        <label>รหัสประจำตัวแพทย์เจ้าของเคส :</label>
        <input type="text" id="caseDoctorId" required>
      </div>
    </form>

    <div class="notice" role="button" tabindex="0" onclick="goToCancelAppointment()" onkeydown="handleCancelNoticeKey(event)" style="cursor: pointer;">
      <span>⊠</span>
      <span>ยกเลิกการนัดหมาย : การนัดหมายนี้จะถูกลบทันที</span>
    </div>

    <div class="form-actions">
      <button class="btn btn-secondary" type="button" onclick="location.href='appointment.html'">ยกเลิกการแก้ไข</button>
      <button class="btn btn-primary" type="submit" form="editAppointmentForm">ยืนยันแก้ไข</button>
    </div>

  </main>
</div>
</div>

<script>
  const STORAGE_KEY = 'appointments_data';
  const params = new URLSearchParams(window.location.search);
  const appointmentId = params.get('id');

  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    if (sidebar) sidebar.classList.toggle('collapsed');
  }

  function logout() {
    if (confirm('ต้องการออกจากระบบ?')) {
      window.location.href = 'login.html';
    }
  }

  function getAppointments() {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  }

  function saveAppointments(appointments) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(appointments));
  }

  function goToCancelAppointment() {
    const id = appointmentId || '';
    window.location.href = id
      ? 'cancel-appointment.html?id=' + encodeURIComponent(id)
      : 'cancel-appointment.html';
  }

  function handleCancelNoticeKey(event) {
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      goToCancelAppointment();
    }
  }

  function loadAppointment() {
    const appointments = getAppointments();
    let appointment = appointments.find(item => item.id === appointmentId);

    if (!appointment && appointments.length > 0) {
      appointment = appointments[0];
    }

    if (!appointment) {
      alert('ไม่พบข้อมูลการนัดหมาย');
      window.location.href = 'appointment.html';
      return;
    }

    document.getElementById('patientId').value = appointment.patientId || '';
    document.getElementById('doctorId').value = appointment.doctorId || '';
    document.getElementById('appointmentDate').value = appointment.date || '';
    document.getElementById('appointmentTime').value = appointment.time || '';
    document.getElementById('caseDoctorId').value = appointment.caseDoctorId || '';
  }

  document.getElementById('editAppointmentForm').addEventListener('submit', function (e) {
    e.preventDefault();

    const appointments = getAppointments();
    let index = appointments.findIndex(item => item.id === appointmentId);

    if (index === -1 && appointments.length > 0) {
      index = 0;
    }

    if (index === -1) {
      alert('ไม่พบข้อมูลการนัดหมาย');
      window.location.href = 'appointment.html';
      return;
    }

    const patientId = document.getElementById('patientId').value.trim();

    appointments[index] = {
      ...appointments[index],
      patientId: patientId,
      doctorId: document.getElementById('doctorId').value.trim(),
      date: document.getElementById('appointmentDate').value,
      time: document.getElementById('appointmentTime').value,
      caseDoctorId: document.getElementById('caseDoctorId').value.trim(),
      name: appointments[index].name && !appointments[index].name.startsWith('ผู้ป่วยรหัส')
        ? appointments[index].name
        : 'ผู้ป่วยรหัส ' + patientId
    };

    saveAppointments(appointments);
    window.location.href = 'appointment.html';
  });

  loadAppointment();
</script>
</body>
</html>
