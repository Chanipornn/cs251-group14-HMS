<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ประวัติใบแจ้งหนี้</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body data-page="invoice-history">
  <div class="app-shell">
    <header class="topbar">
      <button class="hamburger"><i class="fa-solid fa-bars"></i></button>
      <button class="plus-btn" data-nav="create_invoice.html"><i class="fa-solid fa-plus"></i></button>
    </header>
    <div class="layout">
      <aside class="sidebar">
        <nav class="nav-list">
          <a class="nav-item" href="#"><i class="fa-solid fa-notes-medical"></i>ประวัติการรักษา</a>
          <a class="nav-item" href="#"><i class="fa-solid fa-capsules"></i>การจ่ายยา</a>
          <a class="nav-item" href="#"><i class="fa-regular fa-clock"></i>การนัดหมาย</a>
          <a class="nav-item" href="medical_certificate_history.html"><i class="fa-regular fa-file-lines"></i>การออกใบรับรองแพทย์</a>
          <a class="nav-item active" href="invoice_history.html"><i class="fa-solid fa-file-invoice-dollar"></i>ใบแจ้งหนี้</a>
        </nav>
        <div class="profile-box">
          <div class="profile-info"><div class="profile-avatar"><i class="fa-regular fa-user"></i></div><span>นพ. วิรุต</span></div>
          <a href="#" class="logout-link"><i class="fa-solid fa-right-from-bracket"></i></a>
        </div>
      </aside>
      <main class="main">
        <div class="search-row">
          <div class="search-box">
            <input type="text" placeholder="รหัสผู้ป่วย">
            <i class="fa-solid fa-magnifying-glass"></i>
          </div>
        </div>
        <div class="page-title"><h1>ประวัติใบแจ้งหนี้</h1></div>
        <div class="two-col">
          <section>
            <div id="recordList" class="card-list"></div>
            <button class="add-link" data-nav="create_invoice.html">+ สร้างใบแจ้งหนี้</button>
          </section>
          <section id="previewPanel" class="preview-panel"></section>
        </div>
      </main>
    </div>
  </div>
  <script src="../js/app.js"></script>
</body>
</html>
