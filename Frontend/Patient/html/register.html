<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ลงทะเบียนผู้ป่วย</title>
  <link rel="stylesheet" href="../../shared/base.css">
  <link rel="stylesheet" href="../../Patient/css/register.css">
</head>

<body>

<div class="container">

  <h2 class="title">ลงทะเบียนผู้ป่วย</h2>

  <!-- ========================= -->
  <!-- ข้อมูลบัญชี -->
  <!-- ========================= -->
  <h3 class="section">ข้อมูลบัญชี</h3>

  <div class="form-group">
    <label>ชื่อผู้ใช้ <span class="required">*</span></label>
    <input id="username" type="text" placeholder="กรอกชื่อผู้ใช้" required>
  </div>

  <div class="form-group">
    <label>อีเมล <span class="required">*</span></label>
    <input id="email" type="email" placeholder="กรอกอีเมล" required>
  </div>

  <div class="form-group password">
    <label>รหัสผ่าน <span class="required">*</span></label>
    <input id="password" type="password" placeholder="กรอกรหัสผ่าน" required>
    <img src="../../img/eye-off.svg" onclick="togglePassword('password', this)">
  </div>

  <div class="form-group password">
    <label>ยืนยันรหัสผ่าน <span class="required">*</span></label>
    <input id="confirmPassword" type="password" placeholder="กรอกรหัสผ่านอีกครั้ง" required>
    <img src="../../img/eye-off.svg" onclick="togglePassword('confirmPassword', this)">
  </div>

  <!-- ========================= -->
  <!-- ข้อมูลส่วนตัว -->
  <!-- ========================= -->
  <h3 class="section">ข้อมูลส่วนตัว</h3>

  <div class="form-group">
    <label>ชื่อ-นามสกุล <span class="required">*</span></label>
    <div class="row-2">
      <input id="firstname" type="text" placeholder="กรอกชื่อ" required>
      <input id="lastname" type="text" placeholder="กรอกนามสกุล" required>
    </div>
  </div>

  <div class="form-group">
    <label>หมายเลขบัตรประชาชน <span class="required">*</span></label>
    <input id="idcard" type="text" placeholder="กรอกเลขบัตรประชาชน 13 หลัก" required>
  </div>

  <!-- เพศ -->
  <div class="form-group">
    <label>เพศ <span class="required">*</span></label>
    <div class="radio-group">
      <label><input type="radio" name="gender" value="male" required> ผู้ชาย</label>
      <label><input type="radio" name="gender" value="female" required> ผู้หญิง</label>
    </div>
  </div>

  <!-- วันเกิด -->
  <div class="form-group">
    <label>วันเกิด <span class="required">*</span></label>
    <div class="select-row">
      <select class="square" id="day" required>
        <option value="">DD</option>
      </select>
      <select class="square" id="month" required>
        <option value="">MM</option>
      </select>
      <select class="square" id="year" required>
        <option value="">YYYY</option>
      </select>
    </div>
  </div>

  <!-- ========================= -->
  <!-- ข้อมูลติดต่อ -->
  <!-- ========================= -->
  <h3 class="section">ข้อมูลติดต่อ</h3>

  <div class="form-group">
    <label>หมายเลขโทรศัพท์ <span class="required">*</span></label>
    <input id="phone" type="text" placeholder="กรอกหมายเลขโทรศัพท์" required>
  </div>

  <div class="form-group">
    <label>ที่อยู่ <span class="required">*</span></label>
    <input id="address" type="text" placeholder="กรอกที่อยู่ปัจจุบัน" required>
  </div>

  <!-- ========================= -->
  <!-- ข้อมูลสุขภาพ -->
  <!-- ========================= -->
  <h3 class="section">ข้อมูลสุขภาพ</h3>

  <div class="form-group">
    <label>กรุ๊ปเลือด <span class="required">*</span></label>
    <select id="blood" class="square" required>
      <option value="">ตัวเลือก</option>
      <option>A</option>
      <option>B</option>
      <option>AB</option>
      <option>O</option>
    </select>
  </div>

  <div class="form-group">
    <label>โรคประจำตัว <span class="required">*</span></label>
    <input id="disease" type="text" placeholder="กรอกโรคประจำตัว" required>
  </div>

  <!-- ไม่ required -->
  <div class="form-group">
    <label>แพ้ยา</label>
    <input id="allergy" type="text" placeholder="กรอกยาที่แพ้">
  </div>

  <div class="form-group">
    <div class="row-2">
      <div>
        <label>น้ำหนัก (กก.) <span class="required">*</span></label>
        <input id="weight" type="text" placeholder="กรอกน้ำหนัก" required>
      </div>
      <div>
        <label>ส่วนสูง (ซม.) <span class="required">*</span></label>
        <input id="height" type="text" placeholder="กรอกส่วนสูง" required>
      </div>
    </div>
  </div>

  <!-- ========================= -->
  <!-- สิทธิ -->
  <!-- ========================= -->
  <h3 class="section">สิทธิการรักษา <span class="required">*</span></h3>

  <div class="form-group">
    <div class="select-wrapper">
      <select id="right" class="square" required>
        <option value="">ตัวเลือก</option>
        <option>ชำระเงินเอง</option>
        <option>สิทธิบัตรทอง</option>
        <option>สิทธิประกันสังคม</option>
        <option>สิทธิสวัสดิการข้าราชการ</option>
      </select>
    </div>
  </div>

  <!-- BUTTON -->
  <button class="submit" onclick="submitForm()">สร้างบัญชี</button>

  <div class="link">
    มีบัญชีอยู่แล้ว? <a href="../../login.html">เข้าสู่ระบบ</a>
  </div>

</div>

<script src="../JS/register.js"></script>

</body>
</html>
