<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">

<body>
<div class="phone-shell">
 
  <!-- ═══ HEADER ═══ -->
  <div class="header">
    <div class="logo-circle">

        <img src="../../img/hospital.png" alt="logo">
    </div>
    <div class="header-right">
      <span id="username">Username</span>
      <div class="avatar-circle" onclick="location.href='profile.html'">
        <img id="profileImage" src="../../img/profile.jpg">
      </div>
    </div>
  </div>
 
  <!-- ═══ CONTENT ═══ -->
  <div class="content">
 
    <!-- BANNER -->
    <div>
      <div class="banner-wrap">

        <div class="banner-slider" id="bannerSlider">
          <img src="../../img/banner1.jpg" class="banner-img">
          <img src="../../img/banner2.jpg" class="banner-img">
          <img src="../../img/banner3.jpg" class="banner-img">
        </div>
      
        <button class="banner-btn">จองคิวตอนนี้</button>
      </div>
      
      <div class="dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>
 
   <!-- MENU -->
<div class="menu-card">
  <div class="menu-grid">

    <!-- 1 ขอรับคิวตรวจ -->
    <a href="GetQueue.html" class="menu-item">
      <div class="menu-icon">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="4" width="18" height="18" rx="3"/>

    </a>

    <!-- 2 ตรวจสอบคิว -->
    <a href="CheckQueue.html" class="menu-item">
      <div class="menu-icon">
        <svg viewBox="0 0 24 24">
          <circle cx="9" cy="9" r="4"/>

      </div>
      <p class="menu-label">ตรวจสอบคิว</p>

    <!-- 3 รายการนัด -->
    <a href="Appointments.html" class="menu-item">

      </div>
      <p class="menu-label">รายการนัด<br>เลื่อนนัด</p>
    </a>

    <!-- 4 ตรวจสอบสิทธิ -->

      <div class="menu-icon">
        <svg viewBox="0 0 24 24">
