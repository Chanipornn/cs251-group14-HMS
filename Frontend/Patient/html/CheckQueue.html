<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตรวจสอบคิว</title>

    <link rel="stylesheet" href="../css/CheckQueue.css">

    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <div class="mobile-container">

        <header class="app-header">
            <button class="back-link" onclick="window.history.back()">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <h1>ตรวจสอบคิว</h1>
        </header>

        <!-- JS จะ render ตรงนี้ -->
        <div class="queue-content"></div>

        <div id="cancelModal" class="modal-overlay">
            <div class="modal-content">
                <div class="modal-icon-red">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                </div>
                <h2>ยืนยันการยกเลิกคิว</h2>
                <p>คุณแน่ใจหรือไม่ว่าต้องการยกเลิกการจองคิวนี้? <br>หมายเลขคิวของคุณจะถูกลบออกจากระบบทันที</p>
                <div class="modal-buttons">
                    <button class="btn-keep" onclick="closeCancelModal()">เก็บคิวไว้</button>
                    <button class="btn-confirm-cancel" id="confirmCancelBtn">ยืนยันยกเลิก</button>
                </div>
            </div>
        </div>

    </div>
    <script src="../js/CheckQueue.js"></script>

</body>

</html>
