<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Profile</title>
  <link rel="stylesheet" href="../css/home.css">
  <link rel="stylesheet" href="../css/profile.css">
</head>

<body>

<div class="phone-shell">

  <!-- HEADER -->
  <div class="profile-header">
    <h2>ข้อมูลส่วนตัว</h2>
  </div>

  <!-- PROFILE CARD -->
  <div class="profile-card">

    <div class="profile-img-wrapper" onclick="document.getElementById('imageUpload').click()">

      <!-- 🔥 เอา src ออก ให้ JS จัดการ -->
      <img class="profile-img" id="profileImage">

      <!-- ไอคอนแก้ไข -->
      <div class="edit-icon">✎</div>

      <!-- input upload -->
      <input type="file" id="imageUpload" accept="image/*" hidden>

    </div>

    <h3 id="profileName">-</h3>
    <p id="profileEmail">-</p>

    <div class="info-row">
      <span>ชื่อ-นามสกุล</span>
      <p id="fullname">-</p>
    </div>

    <div class="info-row">
      <span>หมายเลขโทรศัพท์</span>
      <p id="phone">-</p>
    </div>

    <div class="info-row">
      <span>เลขบัตรประชาชน</span>
      <p id="idcard">-</p>
    </div>

    <div class="info-row">
      <span>เพศ</span>
      <p id="gender">-</p>
    </div>

    <div class="info-row">
      <span>วันเกิด</span>
      <p id="birth">-</p>
    </div>

    <div class="logout-btn" onclick="logout()">
      <img src="../../img/log out.png" class="logout-icon">
      <span>ออกจากระบบ</span>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">

    <div class="nav-btn" onclick="location.href='home.html'">
      <svg viewBox="0 0 24 24">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
        <path d="M9 21V12h6v9"/>
      </svg>
    </div>

    <div class="nav-btn" onclick="location.href='medical_record.html'">
      <svg viewBox="0 0 24 24">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 12l10 5 10-5"/>
        <path d="M2 17l10 5 10-5"/>
      </svg>
    </div>

    <div class="nav-btn active">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.582-7 8-7s8 3 8 7"/>
      </svg>
    </div>

  </div>

</div>

<script src="../JS/profile.js"></script>
</body>
</html>
