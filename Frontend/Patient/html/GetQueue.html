<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ขอรับคิวตรวจ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/GetQueue.css">
    <script src="../js/GetQueue.js" defer></script>
</head>

<body>

    <div class="mobile-container">
        <header class="booking-header">
            <a href="home.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h1>ขอรับคิวตรวจ</h1>
        </header>

        <div class="search-section">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="ค้นหา...">
                <i class="fas fa-search search-icon"></i>
            </div>
            <div class="filter-btn-container">
                <img src="../../img/filtericon.png" class="filter-icon">
            </div>
        </div>

        <div class="doctor-grid" id="doctorGrid">

            <!-- หมอ 1 -->
            <div class="doctor-card"
            data-name="นพ.สมชาย ศรีสุข"
            data-dept="คลินิก ตา หู คอ จมูก"
            data-img="../../img/doctor_img1.png"
            onclick="selectDoctor(this)">
       
           <div class="heart-icon" onclick="event.stopPropagation(); toggleHeart(this)">❤️</div>
       
           <div class="doc-img-container">
               <img src="../../img/doctor_img1.png" class="doc-avatar">
           </div>
       
           <div class="doc-info">
               <h3>นพ.สมชาย ศรีสุข</h3>
               <p>แผนก หู คอ จมูก</p>
           </div>
       </div>
       
       
       <div class="doctor-card"
            data-name="นพ.นนทพัทธ์ ใจดี"
            data-dept="คลินิก ตา หู คอ จมูก"
            data-img="../../img/doctor_img2.png"
            onclick="selectDoctor(this)">
       
           <div class="heart-icon" onclick="event.stopPropagation(); toggleHeart(this)">❤️</div>
       
           <div class="doc-img-container">
               <img src="../../img/doctor_img2.png" class="doc-avatar">
           </div>
       
           <div class="doc-info">
               <h3>นพ.นนทพัทธ์ ใจดี</h3>
               <p>แผนก หู คอ จมูก</p>
           </div>
       </div>

        </div>
    </div>

</body>
</html>
